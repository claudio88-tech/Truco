<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Truco Argentino</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
:root {
  --celeste:#74ACDF;--celeste-dark:#3a7fbf;--blanco:#F8F8FF;
  --dorado:#D4A017;--dorado-claro:#F0C040;
  --azul-noche:#0a1628;--texto:#e8f4ff;--texto-suave:rgba(232,244,255,0.6);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Lato',sans-serif;background:var(--azul-noche);color:var(--texto);min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 0%,rgba(116,172,223,0.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(116,172,223,0.1) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(10,22,40,0.95) 0%,var(--azul-noche) 100%);pointer-events:none;}
body::after{content:'';position:fixed;top:0;left:0;right:0;height:4px;z-index:10;background:linear-gradient(90deg,var(--celeste) 33%,var(--blanco) 33%,var(--blanco) 67%,var(--celeste) 67%);box-shadow:0 0 20px rgba(116,172,223,0.5);}

#pantalla-lobby{position:relative;z-index:1;width:100%;max-width:440px;padding:24px 20px;display:flex;flex-direction:column;align-items:center;gap:20px;}
.titulo-lobby{font-family:'Playfair Display',serif;font-size:3.2rem;font-weight:900;color:var(--blanco);letter-spacing:6px;text-transform:uppercase;text-shadow:0 0 40px rgba(116,172,223,0.6),0 2px 0 var(--celeste-dark);}
.titulo-lobby span{color:var(--celeste);}
.subtitulo{font-size:0.8rem;letter-spacing:4px;color:var(--dorado);text-transform:uppercase;margin-top:4px;}
.card{background:linear-gradient(160deg,rgba(16,32,64,0.95),rgba(10,22,40,0.98));border:1px solid rgba(116,172,223,0.3);border-radius:16px;padding:24px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,0.4),inset 0 1px 0 rgba(116,172,223,0.2);}
.card h2{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--celeste);margin-bottom:18px;text-align:center;letter-spacing:2px;text-transform:uppercase;}
.campo{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.campo label{font-size:0.7rem;color:var(--dorado);letter-spacing:2px;text-transform:uppercase;font-weight:700;}
.campo input,.campo select{background:rgba(0,0,0,0.4);border:1px solid rgba(116,172,223,0.3);border-radius:8px;padding:11px 14px;color:var(--blanco);font-family:'Lato',sans-serif;font-size:1rem;width:100%;outline:none;transition:border-color .2s,box-shadow .2s;}
.campo input:focus,.campo select:focus{border-color:var(--celeste);box-shadow:0 0 0 3px rgba(116,172,223,0.15);}
.campo select option{background:#102040;}
.modalidad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.mod-btn{padding:10px 6px;border-radius:8px;cursor:pointer;border:1px solid rgba(116,172,223,0.3);background:rgba(0,0,0,0.3);color:var(--texto-suave);font-family:'Lato',sans-serif;font-size:0.85rem;text-align:center;transition:all .2s;}
.mod-btn.activo{border-color:var(--celeste);color:var(--blanco);background:rgba(116,172,223,0.15);}
.mod-btn .mod-icono{font-size:1.2rem;display:block;margin-bottom:2px;}
.toggle-flor{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;background:rgba(0,0,0,0.3);border:1px solid rgba(116,172,223,0.2);margin-bottom:14px;cursor:pointer;}
.toggle-switch{width:40px;height:22px;border-radius:11px;background:rgba(116,172,223,0.2);position:relative;transition:background .3s;flex-shrink:0;}
.toggle-switch.on{background:var(--celeste);}
.toggle-switch::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:white;top:3px;left:3px;transition:left .3s;}
.toggle-switch.on::after{left:21px;}
.toggle-label{font-size:0.85rem;color:var(--texto-suave);}
.toggle-label strong{color:var(--texto);}
.btn{width:100%;padding:13px;border-radius:10px;border:none;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:2px;text-transform:uppercase;}
.btn-primario{background:linear-gradient(135deg,var(--celeste) 0%,var(--celeste-dark) 100%);color:var(--azul-noche);box-shadow:0 4px 20px rgba(116,172,223,0.3);}
.btn-primario:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-secundario{background:transparent;color:var(--celeste);border:1px solid rgba(116,172,223,0.4);margin-top:8px;font-size:0.85rem;}
.separador{display:flex;align-items:center;gap:12px;color:var(--texto-suave);font-size:0.8rem;margin:8px 0;}
.separador::before,.separador::after{content:'';flex:1;height:1px;background:rgba(116,172,223,0.2);}
.sala-codigo{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:900;color:var(--dorado-claro);text-align:center;letter-spacing:8px;padding:14px;background:rgba(0,0,0,0.3);border-radius:10px;border:1px dashed rgba(212,160,23,0.4);margin:8px 0;}
.jugadores-lista{display:flex;flex-direction:column;gap:8px;}
.jugador-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:rgba(0,0,0,0.2);border-radius:8px;border-left:3px solid transparent;}
.jugador-item.equipo-0{border-left-color:var(--celeste);}
.jugador-item.equipo-1{border-left-color:var(--dorado);}
.jugador-item.vacio{opacity:0.35;font-style:italic;}
.jugador-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;background:rgba(116,172,223,0.15);}
.badge-equipo{margin-left:auto;font-size:0.7rem;padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:1px;}
.badge-equipo.e0{background:rgba(116,172,223,0.15);color:var(--celeste);}
.badge-equipo.e1{background:rgba(212,160,23,0.15);color:var(--dorado-claro);}
.msg-info{text-align:center;font-style:italic;color:var(--texto-suave);font-size:0.9rem;padding:6px;}

/* JUEGO */
#pantalla-juego{position:relative;z-index:1;width:100%;max-width:500px;min-height:100dvh;display:flex;flex-direction:column;}
.game-header{padding:10px 14px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(116,172,223,0.15);background:rgba(10,22,40,0.9);}
.game-logo{font-family:'Playfair Display',serif;font-size:1rem;font-weight:900;color:var(--blanco);letter-spacing:3px;}
.game-logo span{color:var(--celeste);}

/* MARCADOR */
.marcadores{display:flex;gap:12px;align-items:center;}
.marcador-equipo{display:flex;flex-direction:column;align-items:center;gap:3px;}
.marcador-nombre{font-size:0.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--texto-suave);}
.marcador-cuadros{display:flex;gap:3px;}
.score-sep{color:rgba(116,172,223,0.4);font-size:0.9rem;}
.mitad-label{font-size:0.52rem;color:var(--texto-suave);letter-spacing:1px;text-transform:uppercase;}

.turno-banner{text-align:center;padding:7px 16px;font-size:0.85rem;color:var(--texto-suave);background:rgba(116,172,223,0.05);border-bottom:1px solid rgba(116,172,223,0.1);min-height:34px;display:flex;align-items:center;justify-content:center;}
.turno-yo{color:var(--dorado-claro);font-weight:700;}
.puntos-juego-banner{text-align:center;padding:4px 14px;font-size:0.78rem;background:rgba(212,160,23,0.08);border-bottom:1px solid rgba(212,160,23,0.2);color:var(--dorado-claro);font-weight:700;letter-spacing:1px;min-height:28px;display:flex;align-items:center;justify-content:center;}
.canto-banner{margin:6px 12px;padding:9px 14px;border-radius:8px;text-align:center;font-size:0.9rem;border:1px solid;animation:pulseBorder 2s ease infinite;}
.canto-truco{border-color:rgba(116,172,223,0.5);color:var(--celeste);background:rgba(116,172,223,0.08);}
.canto-envido{border-color:rgba(212,160,23,0.5);color:var(--dorado-claro);background:rgba(212,160,23,0.08);}
.canto-flor{border-color:rgba(100,220,100,0.5);color:#80ff80;background:rgba(100,220,100,0.08);}
@keyframes pulseBorder{0%,100%{opacity:1}50%{opacity:0.6}}

.mesa-zona{flex:1;display:flex;flex-direction:column;padding:8px 12px;gap:6px;overflow-y:auto;}
.mano-zona{background:rgba(0,0,0,0.2);border-radius:10px;border:1px solid rgba(116,172,223,0.12);padding:8px 10px;}
.mano-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.mano-titulo{font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--texto-suave);font-weight:700;}
.mano-resultado{margin-left:auto;font-size:0.7rem;font-weight:700;letter-spacing:1px;}
.mano-resultado.azul{color:var(--celeste);}
.mano-resultado.dorado{color:var(--dorado-claro);}
.mano-resultado.empate{color:var(--texto-suave);}
.cartas-fila{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start;}
.jugada-item{display:flex;flex-direction:column;align-items:center;gap:4px;animation:aparecer 0.3s ease;}
@keyframes aparecer{from{opacity:0;transform:translateY(-6px) scale(0.9)}to{opacity:1;transform:translateY(0) scale(1)}}
.jugada-nombre{font-size:0.62rem;color:var(--texto-suave);text-align:center;max-width:56px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mesa-vacia{opacity:0.3;font-style:italic;font-size:0.8rem;padding:4px 0;color:var(--texto-suave);}

.acciones-zona{padding:6px 12px 4px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;min-height:44px;}
.btn-accion{padding:7px 14px;border-radius:20px;border:1px solid;font-family:'Lato',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all .18s;background:transparent;letter-spacing:0.5px;}
.btn-truco{border-color:var(--celeste);color:var(--celeste);}
.btn-truco:hover{background:rgba(116,172,223,0.12);}
.btn-envido{border-color:var(--dorado);color:var(--dorado-claro);}
.btn-envido:hover{background:rgba(212,160,23,0.12);}
.btn-flor{border-color:#80ff80;color:#80ff80;}
.btn-quiero{border-color:#5cf07a;color:#5cf07a;}
.btn-noquiero{border-color:#f07a5c;color:#f07a5c;}
.btn-mazo{border-color:rgba(255,255,255,0.2);color:var(--texto-suave);}

.mis-cartas-zona{padding:8px 12px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;background:rgba(0,0,0,0.25);border-top:1px solid rgba(116,172,223,0.12);}
.mi-nombre-label{font-size:0.65rem;color:var(--dorado);letter-spacing:2px;text-transform:uppercase;font-weight:700;}
.mis-cartas{display:flex;gap:10px;justify-content:center;}

/* CARTAS */
.carta{width:66px;height:100px;border-radius:6px;background:#fdf6e3;border:2px solid #c8a86e;display:flex;flex-direction:column;align-items:stretch;padding:0;cursor:pointer;position:relative;box-shadow:2px 3px 10px rgba(0,0,0,0.5),inset 0 0 0 1px rgba(255,255,255,0.6);transition:transform .2s,box-shadow .2s;user-select:none;overflow:hidden;}
.carta::before{content:'';position:absolute;inset:3px;border:1px solid rgba(180,130,60,0.35);border-radius:3px;pointer-events:none;z-index:1;}
.carta:hover:not(.jugada){transform:translateY(-12px) rotate(-1deg);box-shadow:3px 14px 28px rgba(0,0,0,0.6);}
.carta.jugada{opacity:0.3;cursor:default;transform:none!important;filter:grayscale(0.4);}
.carta-inner{display:flex;flex-direction:column;align-items:center;justify-content:space-between;height:100%;padding:5px 4px;}
.carta-num-top{font-family:'Playfair Display',serif;font-weight:900;font-size:1.05rem;color:#1a0800;line-height:1;align-self:flex-start;}
.carta-num-top.rojo{color:#8b0000;}
.carta-centro{display:flex;align-items:center;justify-content:center;flex:1;width:100%;}
.carta-num-bot{font-family:'Playfair Display',serif;font-weight:900;font-size:1.05rem;color:#1a0800;line-height:1;align-self:flex-end;transform:rotate(180deg);}
.carta-num-bot.rojo{color:#8b0000;}
.carta-mini{width:46px;height:68px;border-radius:5px;background:#fdf6e3;border:1.5px solid #c8a86e;display:flex;flex-direction:column;align-items:stretch;padding:0;box-shadow:1px 2px 6px rgba(0,0,0,0.4);overflow:hidden;position:relative;}
.carta-mini::before{content:'';position:absolute;inset:2px;border:1px solid rgba(180,130,60,0.25);border-radius:2px;pointer-events:none;}
.carta-mini .carta-inner{padding:3px 3px;}
.carta-mini .carta-num-top{font-size:0.75rem;}
.carta-mini .carta-num-bot{font-size:0.75rem;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:99;backdrop-filter:blur(4px);}
.notif{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(160deg,#102040,#0a1628);border:1px solid rgba(116,172,223,0.4);border-radius:18px;padding:28px 32px;text-align:center;z-index:100;box-shadow:0 20px 60px rgba(0,0,0,0.8);animation:popIn .3s cubic-bezier(0.175,0.885,0.32,1.275);max-width:88vw;width:320px;}
@keyframes popIn{from{opacity:0;transform:translate(-50%,-50%) scale(0.85)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.notif h2{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--celeste);margin-bottom:10px;}
.notif p{color:var(--texto);font-size:1rem;margin-bottom:18px;line-height:1.5;}
.notif .btn{width:auto;padding:10px 28px;font-size:0.8rem;display:inline-block;}
.hidden{display:none!important;}
</style>
</head>
<body>

<div id="pantalla-lobby">
  <div style="text-align:center;position:relative;z-index:1">
    <div class="titulo-lobby">TRU<span>CO</span></div>
    <div class="subtitulo">🇦🇷 &nbsp; Argentino &nbsp; 🇦🇷</div>
  </div>

  <div id="vista-inicio" class="card">
    <h2>Nueva Sala</h2>
    <div class="campo"><label>Tu nombre</label><input type="text" id="input-nombre" placeholder="Ej: Claudio" maxlength="16" autocomplete="off"></div>
    <div class="campo"><label>Modalidad</label></div>
    <div class="modalidad-grid" id="mod-grid">
      <div class="mod-btn activo" data-mod="1" onclick="selModali(1)"><span class="mod-icono">🤺</span>1 vs 1</div>
      <div class="mod-btn" data-mod="2" onclick="selModali(2)"><span class="mod-icono">🤝</span>2 vs 2</div>
      <div class="mod-btn" data-mod="3" onclick="selModali(3)"><span class="mod-icono">⚔️</span>3 vs 3</div>
    </div>
    <div class="campo"><label>Tu equipo</label></div>
    <div class="modalidad-grid" style="grid-template-columns:1fr 1fr;margin-bottom:14px">
      <div class="mod-btn activo" data-eq="0" onclick="selEquipo(0)"><span class="mod-icono">🔵</span>Azul</div>
      <div class="mod-btn" data-eq="1" onclick="selEquipo(1)"><span class="mod-icono">⭐</span>Dorado</div>
    </div>
    <div class="toggle-flor" onclick="toggleFlor()">
      <div class="toggle-switch" id="toggle-flor-sw"></div>
      <div class="toggle-label"><strong>Jugar con Flor</strong><br><span style="font-size:0.75rem;opacity:0.7">3 cartas del mismo palo</span></div>
    </div>
    <button class="btn btn-primario" onclick="crearSala()">Crear sala</button>
    <div class="separador">o</div>
    <button class="btn btn-secundario" onclick="mostrarUnirse()">Unirse a sala existente</button>
  </div>

  <div id="vista-unirse" class="card hidden">
    <h2>Unirse a Sala</h2>
    <div class="campo"><label>Tu nombre</label><input type="text" id="input-nombre2" placeholder="Ej: Marcelo" maxlength="16" autocomplete="off"></div>
    <div class="campo"><label>Tu equipo</label></div>
    <div class="modalidad-grid" style="grid-template-columns:1fr 1fr;margin-bottom:14px">
      <div class="mod-btn activo" data-eq2="0" onclick="selEquipo2(0)"><span class="mod-icono">🔵</span>Azul</div>
      <div class="mod-btn" data-eq2="1" onclick="selEquipo2(1)"><span class="mod-icono">⭐</span>Dorado</div>
    </div>
    <div class="campo"><label>Código de sala</label><input type="text" id="input-codigo" placeholder="ABCD" maxlength="6" autocomplete="off" style="text-transform:uppercase;letter-spacing:6px;font-size:1.5rem;text-align:center"></div>
    <button class="btn btn-primario" onclick="unirseASala()">Unirse</button>
    <button class="btn btn-secundario" onclick="mostrarInicio()">← Volver</button>
  </div>

  <div id="vista-sala" class="card hidden">
    <h2>Sala de Espera</h2>
    <p class="msg-info">Compartí este código:</p>
    <div class="sala-codigo" id="codigo-display"></div>
    <div id="info-sala" class="msg-info" style="font-size:0.8rem;color:var(--dorado);margin-bottom:10px"></div>
    <div class="jugadores-lista" id="lista-jugadores"></div>
    <div class="msg-info" id="msg-espera" style="margin-top:10px"></div>
    <button class="btn btn-primario hidden" id="btn-empezar" onclick="empezarPartida()">¡Empezar!</button>
  </div>
</div>

<div id="pantalla-juego" class="hidden">
  <div class="game-header">
    <div class="game-logo">TRU<span>CO</span></div>
    <div class="marcadores">
      <div class="marcador-equipo">
        <div class="marcador-nombre" id="nom-eq0">🔵 Azul</div>
        <div class="marcador-cuadros" id="palitos-0"></div>
        <div class="mitad-label" id="mitad-label-0">MALAS</div>
      </div>
      <div class="score-sep">—</div>
      <div class="marcador-equipo">
        <div class="marcador-nombre" id="nom-eq1">⭐ Dorado</div>
        <div class="marcador-cuadros" id="palitos-1"></div>
        <div class="mitad-label" id="mitad-label-1">MALAS</div>
      </div>
    </div>
  </div>
  <div class="turno-banner" id="turno-banner">Cargando...</div>
  <div class="puntos-juego-banner hidden" id="puntos-juego-banner"></div>
  <div class="canto-banner hidden" id="canto-banner"></div>
  <div class="mesa-zona" id="mesa-zona"></div>
  <div class="acciones-zona" id="acciones-zona"></div>
  <div class="mis-cartas-zona">
    <div class="mi-nombre-label" id="mi-nombre-label"></div>
    <div class="mis-cartas" id="mis-cartas"></div>
  </div>
</div>

<div class="overlay hidden" id="overlay"></div>
<div class="notif hidden" id="notif">
  <h2 id="notif-titulo"></h2><p id="notif-msg"></p>
  <button class="btn btn-primario" id="notif-btn">OK</button>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyDyXAjXgSSZIQlauiZWTZEz9od9QydrNog",
  authDomain:"truco-amigos.firebaseapp.com",
  databaseURL:"https://truco-amigos-default-rtdb.firebaseio.com",
  projectId:"truco-amigos",
  storageBucket:"truco-amigos.firebasestorage.app",
  messagingSenderId:"971033179334",
  appId:"1:971033179334:web:7b3e4198fc90059f56d3c7"
});
const db=firebase.database();
let miId=null,miNombre='',miEquipo=0,salaId=null,soyCreador=false,juegoSuscrito=false,estadoLocal=null;
let modalidadSel=1,equipoSel=0,equipoSel2=0,conFlor=false;

function genId(){return Math.random().toString(36).substr(2,8);}
function genCodigo(){return Math.random().toString(36).substr(2,4).toUpperCase();}

// ===== SVG PALOS ESPAÑOL =====
function svgPalo(palo,size){
  const s=size||34;
  const d={
    espada:`<svg width="${s}" height="${s}" viewBox="0 0 40 40" fill="none">
      <polygon points="20,3 17,30 20,28 23,30" fill="#8090b0" stroke="#5060a0" stroke-width="0.5"/>
      <line x1="20" y1="3" x2="20" y2="28" stroke="#ccd4f0" stroke-width="0.8"/>
      <rect x="11" y="27" width="18" height="3" rx="1.5" fill="#7a6030" stroke="#5a4020" stroke-width="0.5"/>
      <rect x="18.5" y="30" width="3" height="5" rx="1" fill="#7a6030"/>
      <ellipse cx="20" cy="36.5" rx="3.5" ry="2" fill="#9a8040" stroke="#5a4020" stroke-width="0.5"/>
    </svg>`,
    basto:`<svg width="${s}" height="${s}" viewBox="0 0 40 40" fill="none">
      <path d="M17.5 37 Q16 28 17 21 Q15 16 16.5 10 Q18 4 20 3 Q22 4 23.5 10 Q25 16 23 21 Q24 28 22.5 37 Z" fill="#8B5E3C" stroke="#5a3a18" stroke-width="0.8"/>

}

const PALOS=['espada','basto','oro','copa'];
const JERARQUIA={'1-espada':1,'1-basto':2,'7-espada':3,'7-oro':4,'3-espada':5,'3-basto':5,'3-oro':5,'3-copa':5,'2-espada':6,'2-basto':6,'2-oro':6,'2-copa':6,'1-oro':7,'1-copa':7,'12-espada':8,'12-basto':8,'12-oro':8,'12-copa':8,'11-espada':9,'11-basto':9,'11-oro':9,'11-copa':9,'10-espada':10,'10-basto':10,'10-oro':10,'10-copa':10,'7-basto':11,'7-copa':11,'6-espada':12,'6-basto':12,'6-oro':12,'6-copa':12,'5-espada':13,'5-basto':13,'5-oro':13,'5-copa':13,'4-espada':14,'4-basto':14,'4-oro':14,'4-copa':14};
function poderCarta(c){return JERARQUIA[c.num+'-'+c.palo]||15;}
function esRojo(p){return p==='copa'||p==='oro';}
function valorEnvido(n){return n>=10?0:n;}

function calcularEnvido(cartas){
  let mejor=0;
  PALOS.forEach(p=>{
    const del=cartas.filter(c=>c.palo===p);
    if(del.length>=2){const vals=del.map(c=>valorEnvido(c.num)).sort((a,b)=>b-a);mejor=Math.max(mejor,20+vals[0]+vals[1]);}
    else if(del.length===1)mejor=Math.max(mejor,valorEnvido(del[0].num));
  });
  return mejor;
}
function tieneFlor(cartas){return PALOS.some(p=>cartas.filter(c=>c.palo===p).length===3);}
function calcularFlor(cartas){
  for(const p of PALOS){if(cartas.filter(c=>c.palo===p).length===3)return 20+cartas.reduce((s,c)=>s+valorEnvido(c.num),0);}
  return 0;
}
function generarMazo(){
  const mazo=[];
  PALOS.forEach(p=>[1,2,3,4,5,6,7,10,11,12].forEach(n=>mazo.push({num:n,palo:p})));
  for(let i=mazo.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[mazo[i],mazo[j]]=[mazo[j],mazo[i]];}
  return mazo;
}

// ===== MARCADOR: 5 COPITAS POR CUADRADO =====
function svgCopita(activa){
  const c=activa?'#F0C040':'rgba(240,192,64,0.13)';
  const g=activa?'filter:drop-shadow(0 0 2px rgba(240,192,64,0.9));':'';
  return `<svg width="9" height="13" viewBox="0 0 9 13" fill="none" style="${g}">
    <path d="M1.5 1 Q1.5 6 4.5 7.5 Q7.5 6 7.5 1 Z" stroke="${c}" stroke-width="1" fill="none"/>
    <path d="M0 2 Q0 5 1.5 5.5" stroke="${c}" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M9 2 Q9 5 7.5 5.5" stroke="${c}" stroke-width="1" fill="none" stroke-linecap="round"/>
    <line x1="4.5" y1="7.5" x2="4.5" y2="10" stroke="${c}" stroke-width="1" stroke-linecap="round"/>
    <line x1="2" y1="10" x2="7" y2="10" stroke="${c}" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="1" y1="12.5" x2="8" y2="12.5" stroke="${c}" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="2" y1="10" x2="1" y2="12.5" stroke="${c}" stroke-width="1" stroke-linecap="round"/>
    <line x1="7" y1="10" x2="8" y2="12.5" stroke="${c}" stroke-width="1" stroke-linecap="round"/>
  </svg>`;
}

function dibujarCuadro(ptsActivos,base){
  // 5 copitas: izq, arriba, der, abajo, cruz(diagonal)
  const act=[ptsActivos>base,ptsActivos>base+1,ptsActivos>base+2,ptsActivos>base+3,ptsActivos>base+4];
  const col_on='#F0C040',col_off='rgba(240,192,64,0.1)';

  const wrap=document.createElement('div');
  wrap.style.cssText='position:relative;width:36px;height:36px;flex-shrink:0;';

  // SVG de fondo con líneas del cuadrado
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width','36');svg.setAttribute('height','36');svg.setAttribute('viewBox','0 0 36 36');
  svg.style.cssText='position:absolute;top:0;left:0;';
  const lines=[
    {x1:4,y1:4,x2:4,y2:32},   // izq
    {x1:4,y1:4,x2:32,y2:4},   // arriba
    {x1:32,y1:4,x2:32,y2:32}, // der
    {x1:4,y1:32,x2:32,y2:32}, // abajo
    {x1:4,y1:4,x2:32,y2:32},  // diagonal
  ];
  lines.forEach((l,i)=>{
    const el=document.createElementNS('http://www.w3.org/2000/svg','line');
    el.setAttribute('x1',l.x1);el.setAttribute('y1',l.y1);el.setAttribute('x2',l.x2);el.setAttribute('y2',l.y2);
    el.setAttribute('stroke',act[i]?col_on:col_off);el.setAttribute('stroke-width','1');
    el.setAttribute('stroke-linecap','round');
    if(!act[i])el.setAttribute('stroke-dasharray','2,2');
    svg.appendChild(el);
  });
  wrap.appendChild(svg);

  // Copitas en cada segmento (centradas en cada lado/diagonal)
  // posiciones (left,top) de cada copita, centrada en su trazo
  const pos=[
    {l:0,t:11},   // izq (vertical izq, medio)
    {l:13,t:0},   // arriba (horizontal arriba, medio)
    {l:27,t:11},  // der (vertical der, medio)
    {l:13,t:23},  // abajo (horizontal abajo, medio)
    {l:13,t:11},  // diagonal (centro)
  ];
  pos.forEach((p,i)=>{
    const d=document.createElement('div');
    d.style.cssText=`position:absolute;left:${p.l}px;top:${p.t}px;line-height:0;`;
    d.innerHTML=svgCopita(act[i]);
    wrap.appendChild(d);
  });
  return wrap;
}

function renderPalitos(pts,contenedor,labelEl){
  contenedor.innerHTML='';
  const enBuenas=pts>=15;
  const ptsActivos=enBuenas?pts-15:pts;
  if(labelEl)labelEl.textContent=enBuenas?'BUENAS':'MALAS';
  for(let c=0;c<3;c++)contenedor.appendChild(dibujarCuadro(ptsActivos,c*5));
}

// ===== JUEGO =====
function iniciarNuevaRonda(jugadores,puntos,modalidad,conFlor,manoOffset){
  const mazo=generarMazo();const mod=modalidad||2;
  const porEq=[[],[]];jugadores.forEach(j=>porEq[j.equipo]&&porEq[j.equipo].push(j));
  const ordenBase=[];for(let i=0;i<mod;i++){if(porEq[0][i])ordenBase.push(porEq[0][i].id);if(porEq[1][i])ordenBase.push(porEq[1][i].id);}
  const orden=[];for(let i=0;i<ordenBase.length;i++)orden.push(ordenBase[(i+manoOffset)%ordenBase.length]);
  const manos={};jugadores.forEach((j,idx)=>{manos[j.id]=[mazo[idx*3],mazo[idx*3+1],mazo[idx*3+2]];});
  const jugObj={};jugadores.forEach(j=>{jugObj[j.id]=j;});
  const flores={};if(conFlor)jugadores.forEach(j=>{flores[j.id]=tieneFlor(manos[j.id]);});
  const puedenEnvido=[];
  if(mod===1)orden.forEach(id=>puedenEnvido.push(id));
  else{puedenEnvido.push(orden[orden.length-2]);puedenEnvido.push(orden[orden.length-1]);}
  const estado={jugadores:jugObj,orden,puntos,manos,flores,modalidad:mod,conFlor,cartasEnMesa:[],manoActual:0,resultadoManos:[],turnoIdx:0,manoOffset,truco:{estado:'sin_cantar',cantadoPor:null,nivel:0},envido:{estado:'sin_cantar',cantadoPor:null,nivel:0},florCantada:{estado:'sin_cantar',cantadoPor:null,nivel:0},faseEnvido:'disponible',puedenEnvido,finMano:false,finPartida:false,ganadorPartida:null,procesandoFinMano:false};
  db.ref('salas/'+salaId).update({estado:'jugando',juego:estado});
}

function renderJuego(){
  const e=estadoLocal;if(!e)return;

function renderAcciones(e,esMiTurno){
  const el=document.getElementById('acciones-zona');el.innerHTML='';
  const t=e.truco,ev=e.envido,fl=e.florCantada||{estado:'sin_cantar'};
  const miEq=(e.jugadores[miId]||{}).equipo;
  const trucoEspera=['cantado','retrucando','valecuatrando'].includes(t.estado);
  const envidoEspera=ev.estado==='cantado';
  const florEspera=['cantada','contrafloreando'].includes(fl.estado);

  if(florEspera){
    const cantadorEq=(e.jugadores[fl.cantadoPor]||{}).equipo;
    if(cantadorEq!==miEq){
      el.appendChild(mkBtn('Con flor me achico','btn-noquiero',()=>responderFlor('achico',e)));
      if(e.manos[miId]&&tieneFlor(e.manos[miId])){
        el.appendChild(mkBtn('Flor','btn-flor',()=>responderFlor('flor',e)));
        if(fl.nivel<2)el.appendChild(mkBtn('Contraflor','btn-flor',()=>responderFlor('contraflor',e)));
      }
    }
    return;
  }
  const cantadorEq=trucoEspera?(e.jugadores[t.cantadoPor]||{}).equipo:envidoEspera?(e.jugadores[ev.cantadoPor]||{}).equipo:-1;
  const debeResponder=(trucoEspera||envidoEspera)&&cantadorEq!==miEq;
  if(debeResponder){
    el.appendChild(mkBtn('✅ Quiero','btn-quiero',()=>responderCanto('quiero',e)));
    el.appendChild(mkBtn('❌ No quiero','btn-noquiero',()=>responderCanto('noquiero',e)));
    if(trucoEspera&&t.nivel<3){const subs=['','','Re-truco','Vale cuatro'];el.appendChild(mkBtn(subs[t.nivel+1],'btn-truco',()=>cantarTruco(t.nivel+1)));}
    if(envidoEspera){
      if(ev.nivel<3)el.appendChild(mkBtn('Real envido','btn-envido',()=>cantarEnvido(3,e)));
      el.appendChild(mkBtn('Falta envido','btn-envido',()=>cantarEnvido(4,e)));
    }
    return;
  }
  if(!esMiTurno)return;
  if(e.conFlor&&e.manos[miId]&&tieneFlor(e.manos[miId])&&fl.estado==='sin_cantar'&&e.faseEnvido!=='resuelto')
    el.appendChild(mkBtn('🌸 Flor','btn-flor',()=>cantarFlor(1)));
  if(t.estado==='sin_cantar')el.appendChild(mkBtn('Truco','btn-truco',()=>cantarTruco(1)));
  else if(t.estado==='aceptado'&&t.nivel<3&&t.cantadoPor!==miId){const subs=['','','Re-truco','Vale cuatro'];el.appendChild(mkBtn(subs[t.nivel+1],'btn-truco',()=>cantarTruco(t.nivel+1)));}
  const trucoAceptado=t.estado==='aceptado';
  const envidoDisp=e.manoActual===0&&e.faseEnvido==='disponible'&&!trucoAceptado&&fl.estado==='sin_cantar'&&(e.puedenEnvido||[]).includes(miId);
  if(envidoDisp){
    el.appendChild(mkBtn('Envido','btn-envido',()=>cantarEnvido(1,e)));
    el.appendChild(mkBtn('Real envido','btn-envido',()=>cantarEnvido(3,e)));
    el.appendChild(mkBtn('Falta envido','btn-envido',()=>cantarEnvido(4,e)));
  }
  el.appendChild(mkBtn('Ir al mazo','btn-mazo',()=>irAlMazo(e)));
}
function mkBtn(txt,cls,fn){const b=document.createElement('button');b.className='btn-accion '+cls;b.textContent=txt;b.addEventListener('click',fn);return b;}

// ===== ACCIONES =====
function jugarCarta(idx){
  const e=estadoLocal;if(!e||e.orden[e.turnoIdx]!==miId)return;
  if(['cantado','retrucando','valecuatrando'].includes(e.truco.estado))return;
  if(e.envido.estado==='cantado')return;
  const fl=e.florCantada||{estado:'sin_cantar'};
  if(['cantada','contrafloreando'].includes(fl.estado))return;
  const jugadas=new Set((e.cartasEnMesa||[]).filter(c=>c.jugadorId===miId).map(c=>c.cartaIdx));
  if(jugadas.has(idx))return;
  const carta=e.manos[miId][idx];
  const nuevas=[...(e.cartasEnMesa||[]),{jugadorId:miId,carta,cartaIdx:idx,mano:e.manoActual}];
  const nuevoTurnoIdx=(e.turnoIdx+1)%e.orden.length;
  const finMano=nuevas.filter(c=>c.mano===e.manoActual).length===e.orden.length;
  const upd={cartasEnMesa:nuevas,turnoIdx:nuevoTurnoIdx,finMano};
  if(e.manoActual===0&&e.faseEnvido==='disponible')upd.faseEnvido='resuelto';
  db.ref('salas/'+salaId+'/juego').update(upd);
}
function cantarTruco(nivel){
  const estados={1:'cantado',2:'retrucando',3:'valecuatrando'};
  db.ref('salas/'+salaId+'/juego/truco').update({estado:estados[nivel],cantadoPor:miId,nivel});
  db.ref('salas/'+salaId+'/juego').update({faseEnvido:'resuelto'});
}
function cantarEnvido(nivel,e){
  db.ref('salas/'+salaId+'/juego/envido').update({estado:'cantado',cantadoPor:miId,nivel});
  db.ref('salas/'+salaId+'/juego').update({faseEnvido:'cantado'});
}
function cantarFlor(nivel){
  db.ref('salas/'+salaId+'/juego/florCantada').update({estado:'cantada',cantadoPor:miId,nivel});
  db.ref('salas/'+salaId+'/juego').update({faseEnvido:'resuelto'});
}
function responderFlor(resp,e){
  const fl=e.florCantada;const cantadorEq=(e.jugadores[fl.cantadoPor]||{}).equipo||0;
  if(resp==='achico')sumarPuntos(cantadorEq,3,e,'flor_resuelta');
  else if(resp==='flor'){
    const flVal={};Object.entries(e.manos).forEach(([jId,cartas])=>{if(tieneFlor(cartas))flVal[jId]=calcularFlor(cartas);});
    let mejorEq=cantadorEq,mejorVal=0;
    Object.entries(flVal).forEach(([jId,v])=>{if(v>mejorVal){mejorVal=v;mejorEq=(e.jugadores[jId]||{}).equipo;}});
    sumarPuntos(mejorEq,3,e,'flor_resuelta');
  } else db.ref('salas/'+salaId+'/juego/florCantada').update({estado:'contrafloreando',cantadoPor:miId,nivel:2});
}
function responderCanto(resp,e){
  const t=e.truco,ev=e.envido;
  const trucoEspera=['cantado','retrucando','valecuatrando'].includes(t.estado);
  if(trucoEspera){
    if(resp==='quiero')db.ref('salas/'+salaId+'/juego/truco').update({estado:'aceptado'});
    else{
      const ganEq=(e.jugadores[t.cantadoPor]||{}).equipo||0;
      // No querido: truco=1, retruco=2, valecuatro=3
      const pts=t.nivel;
      sumarPuntos(ganEq,pts,e,'truco_resuelto');
    }
  } else if(ev.estado==='cantado'){
    if(resp==='quiero')resolverEnvido(e);
    else sumarPuntos((e.jugadores[ev.cantadoPor]||{}).equipo||0,1,e,'envido_resuelto');
  }
}
function resolverEnvido(e){
  const porEq=[[],[]];
  Object.entries(e.manos).forEach(([jId,cartas])=>{const eq=(e.jugadores[jId]||{}).equipo;if(eq!==undefined)porEq[eq].push(calcularEnvido(cartas));});
  const pe0=porEq[0].length?Math.max(...porEq[0]):0;
  const pe1=porEq[1].length?Math.max(...porEq[1]):0;
  let ganEq=pe0>pe1?0:pe0<pe1?1:((e.jugadores[e.orden[0]]||{}).equipo||0);
  const nivel=e.envido.nivel;
  // Puntos correctos: Envido=2, Envido-Envido=4, Real envido=3, Falta envido=lo que falta
  let pts=nivel===1?2:nivel===2?4:nivel===3?3:Math.max(1,30-e.puntos[ganEq]);
  sumarPuntos(ganEq,pts,e,'envido_resuelto');
}
function irAlMazo(e){
  const miEq=(e.jugadores[miId]||{}).equipo;const contrario=miEq===0?1:0;
  // Si truco aceptado: nivel+1 puntos (truco=2, retruco=3, vale cuatro=4). Si no: 1
  const pts=e.truco.estado==='aceptado'?e.truco.nivel+1:1;
  sumarPuntos(contrario,pts,e,'mazo');
  const nuevoOffset=((e.manoOffset||0)+1)%e.orden.length;
  setTimeout(()=>{
    db.ref('salas/'+salaId+'/juego').once('value').then(snap=>{
      const j=snap.val();if(!j.finPartida)iniciarNuevaRonda(Object.values(j.jugadores),j.puntos,j.modalidad,j.conFlor,nuevoOffset);
    });
  },1500);
}
function sumarPuntos(eq,pts,e,motivo){
  const nuevos=[...e.puntos];nuevos[eq]+=pts;
  const fin=nuevos[0]>=30||nuevos[1]>=30;
  const upd={puntos:nuevos,finPartida:fin,ganadorPartida:fin?eq:null};
  if(motivo==='envido_resuelto'||motivo==='flor_resuelta'){upd.faseEnvido='resuelto';upd['envido/estado']='resuelto';if(motivo==='flor_resuelta')upd['florCantada/estado']='resuelta';}
  if(motivo==='truco_resuelto')upd['truco/estado']='resuelto';
  db.ref('salas/'+salaId+'/juego').update(upd);
}

// ===== FIN DE MANO =====
function procesarFinMano(e){
  if(e.orden[0]!==miId)return;
  db.ref('salas/'+salaId+'/juego').update({procesandoFinMano:true});
  const jugadas=(e.cartasEnMesa||[]).filter(c=>c.mano===e.manoActual);
  const ganador=resolverMano(jugadas,e.jugadores);
  const nuevosRes=[...(e.resultadoManos||[]),ganador];
  const nuevaMano=e.manoActual+1;
  const ganadorRonda=resolverRonda(nuevosRes);

  if(ganadorRonda!==null||nuevaMano>=3){
    const eq=ganadorRonda!==null?ganadorRonda:0;
    // Puntos de truco: aceptado→nivel+1; sin cantar→1
    const ptsTruco=e.truco.estado==='aceptado'?e.truco.nivel+1:1;
    const nuevos=[...e.puntos];nuevos[eq]+=ptsTruco;
    const fin=nuevos[0]>=30||nuevos[1]>=30;
    const nuevoOffset=((e.manoOffset||0)+1)%e.orden.length;
    if(fin){
      db.ref('salas/'+salaId+'/juego').update({resultadoManos:nuevosRes,finPartida:true,ganadorPartida:eq,puntos:nuevos,finMano:false,procesandoFinMano:false});
    } else {
      db.ref('salas/'+salaId+'/juego').update({resultadoManos:nuevosRes,puntos:nuevos,finMano:false,procesandoFinMano:false});
      setTimeout(()=>iniciarNuevaRonda(Object.values(e.jugadores),nuevos,e.modalidad,e.conFlor,nuevoOffset),2500);
    }
  } else {
    let nuevoTurnoIdx=0;
    if(ganador!=='empate'){const pg=e.orden.find(id=>(e.jugadores[id]||{}).equipo===ganador);if(pg)nuevoTurnoIdx=e.orden.indexOf(pg);}
    db.ref('salas/'+salaId+'/juego').update({manoActual:nuevaMano,resultadoManos:nuevosRes,turnoIdx:nuevoTurnoIdx,finMano:false,procesandoFinMano:false});
  }
}
function resolverMano(jugadas,jugadores){
  let mejor=null,empate=false;
  jugadas.forEach(j=>{const p=poderCarta(j.carta);if(!mejor||p<poderCarta(mejor.carta)){mejor=j;empate=false;}else if(p===poderCarta(mejor.carta))empate=true;});
  if(empate)return'empate';return(jugadores[mejor.jugadorId]||{}).equipo??0;
}
function resolverRonda(res){
  const g0=res.filter(r=>r===0).length,g1=res.filter(r=>r===1).length;
  if(g0>=2)return 0;if(g1>=2)return 1;
  if(res[0]==='empate'&&res.length>=2&&res[1]!=='empate')return res[1];
  if(res.length===3)return 0;return null;
}
</script>

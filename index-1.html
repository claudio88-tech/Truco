<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Truco</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<!-- Firebase v8 (compatible sin módulos) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
:root {
  --verde: #1a3a1a;
  --verde-claro: #2d5a2d;
  --verde-mesa: #0f2a0f;
  --dorado: #c9a84c;
  --dorado-claro: #e8c96a;
  --crema: #f5e6c8;
  --rojo: #8b1a1a;
  --texto: #f0ddb0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Crimson Pro', serif;
  background: var(--verde-mesa);
  color: var(--texto);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
#pantalla-lobby {
  width: 100%; max-width: 420px;
  padding: 24px 20px;
  display: flex; flex-direction: column;
  align-items: center; gap: 20px;
}
.titulo-lobby {
  font-family: 'Cinzel Decorative', cursive;
  font-size: 2.8rem; color: var(--dorado);
  text-shadow: 0 0 30px rgba(201,168,76,0.4), 2px 2px 0 #000;
  text-align: center;
}
.subtitulo { color: var(--dorado-claro); font-size: 1.1rem; font-style: italic; opacity: 0.8; }
.card {
  background: linear-gradient(145deg, #1e4a1e, #142e14);
  border: 1px solid var(--dorado); border-radius: 12px;
  padding: 24px; width: 100%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,168,76,0.2);
}
.card h2 {
  font-family: 'Cinzel Decorative', cursive;
  font-size: 1rem; color: var(--dorado);
  margin-bottom: 16px; text-align: center;
}
.campo { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.campo label { font-size: 0.85rem; color: var(--dorado-claro); letter-spacing: 1px; text-transform: uppercase; }
.campo input, .campo select {
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(201,168,76,0.4); border-radius: 8px;
  padding: 12px 14px; color: var(--crema);
  font-family: 'Crimson Pro', serif; font-size: 1.1rem;
  width: 100%; outline: none; transition: border-color 0.2s;
}
.campo input:focus, .campo select:focus { border-color: var(--dorado); }
.campo select option { background: #1a3a1a; }
.btn {
  width: 100%; padding: 14px; border-radius: 10px; border: none;
  font-family: 'Cinzel Decorative', cursive; font-size: 1rem;
  cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
}
.btn-primario {
  background: linear-gradient(135deg, var(--dorado), #a07830);
  color: #1a0a00; box-shadow: 0 4px 16px rgba(201,168,76,0.3);
}
.btn-primario:hover { filter: brightness(1.1); }
.btn-secundario {
  background: transparent; color: var(--dorado);
  border: 1px solid var(--dorado); margin-top: 8px;
}
.separador {
  display: flex; align-items: center; gap: 12px;
  color: rgba(201,168,76,0.5); font-size: 0.85rem; margin: 8px 0;
}
.separador::before, .separador::after {
  content: ''; flex: 1; height: 1px; background: rgba(201,168,76,0.3);
}
.sala-codigo {
  font-family: 'Cinzel Decorative', cursive; font-size: 2rem;
  color: var(--dorado-claro); text-align: center; letter-spacing: 6px;
  padding: 12px; background: rgba(0,0,0,0.3);
  border-radius: 8px; border: 1px dashed rgba(201,168,76,0.4);
  margin: 8px 0;
}
.jugadores-lista { display: flex; flex-direction: column; gap: 8px; }
.jugador-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: rgba(0,0,0,0.3);
  border-radius: 8px; border-left: 3px solid transparent;
}
.jugador-item.equipo-0 { border-left-color: #4a9eff; }
.jugador-item.equipo-1 { border-left-color: #ff6b6b; }
.jugador-item.vacio { opacity: 0.4; font-style: italic; }
.jugador-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: rgba(201,168,76,0.2);
}
.badge-equipo {
  margin-left: auto; font-size: 0.75rem;
  padding: 2px 8px; border-radius: 20px;
  font-family: 'Cinzel Decorative', cursive;
}
.badge-equipo.e0 { background: rgba(74,158,255,0.2); color: #4a9eff; }
.badge-equipo.e1 { background: rgba(255,107,107,0.2); color: #ff6b6b; }
.msg-info {
  text-align: center; font-style: italic;
  color: var(--dorado-claro); opacity: 0.8;
  font-size: 0.95rem; padding: 8px;
}

/* JUEGO */
#pantalla-juego {
  width: 100%; max-width: 480px;
  min-height: 100dvh; display: flex;
  flex-direction: column; padding-bottom: 16px;
}
.game-header {
  background: linear-gradient(180deg, #0a1a0a, transparent);
  padding: 10px 16px 6px;
  display: flex; align-items: center; justify-content: space-between;
}
.game-title { font-family: 'Cinzel Decorative', cursive; font-size: 1.1rem; color: var(--dorado); }
.puntaje-header { display: flex; gap: 12px; align-items: center; }
.equipo-score { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.equipo-nombre { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }
.equipo-puntos { font-size: 1.4rem; font-weight: 600; color: var(--dorado-claro); }
.score-sep { color: var(--dorado); opacity: 0.5; font-size: 1.2rem; }
.turno-banner {
  background: linear-gradient(90deg, transparent, rgba(201,168,76,0.15), transparent);
  border-top: 1px solid rgba(201,168,76,0.3);
  border-bottom: 1px solid rgba(201,168,76,0.3);
  text-align: center; padding: 6px; font-size: 0.85rem;
  color: var(--dorado-claro); font-style: italic; min-height: 32px;
}
.turno-yo { color: #4aff8c; font-weight: 600; }
.canto-banner {
  background: linear-gradient(90deg, transparent, rgba(74,158,255,0.1), transparent);
  border: 1px solid rgba(74,158,255,0.3);
  border-radius: 8px; margin: 6px 16px;
  padding: 10px 16px; text-align: center;
  font-size: 1rem; color: #7bc8ff;
}
.mesa-zona {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 8px 16px; gap: 12px;
}
.ronda-indicador {
  font-family: 'Cinzel Decorative', cursive;
  font-size: 0.75rem; color: var(--dorado);
  letter-spacing: 2px; opacity: 0.8;
}
.mesa-cartas {
  display: flex; gap: 16px; justify-content: center;
  flex-wrap: wrap; min-height: 120px; align-items: center;
}
.jugada-en-mesa {
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
  animation: aparecer 0.3s ease;
}
@keyframes aparecer {
  from { opacity: 0; transform: translateY(-8px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.jugada-nombre { font-size: 0.7rem; opacity: 0.7; text-align: center; max-width: 70px; }
.resultado-ronda {
  text-align: center; font-family: 'Cinzel Decorative', cursive;
  font-size: 0.75rem; color: var(--dorado); padding: 4px;
  min-height: 24px; letter-spacing: 1px;
}
.acciones-zona {
  padding: 6px 16px; display: flex;
  gap: 8px; justify-content: center; flex-wrap: wrap;
}
.btn-accion {
  padding: 8px 16px; border-radius: 20px; border: 1px solid;
  font-family: 'Crimson Pro', serif; font-size: 0.95rem;
  cursor: pointer; transition: all 0.2s; background: transparent;
}
.btn-truco { border-color: #ff6b6b; color: #ff6b6b; }
.btn-truco:hover { background: rgba(255,107,107,0.15); }
.btn-envido { border-color: #4a9eff; color: #4a9eff; }
.btn-envido:hover { background: rgba(74,158,255,0.15); }
.btn-quiero { border-color: #4aff8c; color: #4aff8c; }
.btn-quiero:hover { background: rgba(74,255,140,0.15); }
.btn-noquiero { border-color: #ff9999; color: #ff9999; }
.btn-noquiero:hover { background: rgba(255,107,107,0.15); }
.btn-mazo { border-color: rgba(201,168,76,0.5); color: var(--dorado-claro); }
.btn-mazo:hover { background: rgba(201,168,76,0.1); }
.mis-cartas-zona {
  padding: 8px 16px; display: flex;
  flex-direction: column; align-items: center; gap: 8px;
}
.mi-nombre-label {
  font-size: 0.75rem; color: var(--dorado-claro);
  opacity: 0.7; letter-spacing: 1px; text-transform: uppercase;
}
.mis-cartas { display: flex; gap: 12px; justify-content: center; }

/* CARTAS */
.carta {
  width: 70px; height: 105px; border-radius: 8px;
  background: var(--crema); border: 2px solid #d4b896;
  display: flex; flex-direction: column;
  align-items: center; justify-content: space-between;
  padding: 6px 4px; cursor: pointer; position: relative;
  box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
  transition: transform 0.2s, box-shadow 0.2s;
  user-select: none; -webkit-tap-highlight-color: transparent;
}
.carta:hover:not(.jugada) {
  transform: translateY(-8px);
  box-shadow: 3px 10px 20px rgba(0,0,0,0.6);
}
.carta.jugada { opacity: 0.35; cursor: default; transform: none !important; }
.carta-num {
  font-family: 'Cinzel Decorative', cursive;
  font-size: 1.1rem; color: #1a0a00; line-height: 1;
}
.carta-num.rojo { color: #8b1a1a; }
.carta-palo { font-size: 1.8rem; line-height: 1; }
.carta-num-bot {
  font-family: 'Cinzel Decorative', cursive;
  font-size: 1.1rem; color: #1a0a00; line-height: 1;
  transform: rotate(180deg);
}
.carta-num-bot.rojo { color: #8b1a1a; }

.carta-mesa {
  width: 55px; height: 82px; border-radius: 6px;
  background: var(--crema); border: 2px solid #d4b896;
  display: flex; flex-direction: column;
  align-items: center; justify-content: space-between;
  padding: 4px 3px;
  box-shadow: 2px 2px 8px rgba(0,0,0,0.5);
}
.carta-mesa .carta-num { font-size: 0.85rem; }
.carta-mesa .carta-palo { font-size: 1.3rem; }
.carta-mesa .carta-num-bot { font-size: 0.85rem; }

/* NOTIF */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 99;
}
.notif {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: linear-gradient(135deg, #1e4a1e, #0f2a0f);
  border: 2px solid var(--dorado); border-radius: 16px;
  padding: 24px 32px; text-align: center;
  z-index: 100; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  animation: popIn 0.3s ease; max-width: 88vw; width: 320px;
}
@keyframes popIn {
  from { opacity: 0; transform: translate(-50%,-50%) scale(0.85); }
  to { opacity: 1; transform: translate(-50%,-50%) scale(1); }
}
.notif h2 {
  font-family: 'Cinzel Decorative', cursive;
  font-size: 1.3rem; color: var(--dorado); margin-bottom: 10px;
}
.notif p { color: var(--texto); font-size: 1.05rem; margin-bottom: 16px; line-height: 1.4; }
.notif .btn { width: auto; padding: 10px 24px; font-size: 0.85rem; }
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="pantalla-lobby">
  <div class="titulo-lobby">TRUCO</div>
  <div class="subtitulo">2 vs 2 · Argentina</div>

  <div id="vista-inicio" class="card">
    <h2>Nueva Partida</h2>
    <div class="campo">
      <label>Tu nombre</label>
      <input type="text" id="input-nombre" placeholder="Ej: Claudio" maxlength="16" autocomplete="off">
    </div>
    <div class="campo">
      <label>Tu equipo</label>
      <select id="select-equipo">
        <option value="0">🔵 Equipo Azul</option>
        <option value="1">🔴 Equipo Rojo</option>
      </select>
    </div>
    <button class="btn btn-primario" onclick="crearSala()">Crear sala</button>
    <div class="separador">o</div>
    <button class="btn btn-secundario" onclick="mostrarUnirse()">Unirse a sala existente</button>
  </div>

  <div id="vista-unirse" class="card hidden">
    <h2>Unirse a sala</h2>
    <div class="campo">
      <label>Tu nombre</label>
      <input type="text" id="input-nombre2" placeholder="Ej: Marcelo" maxlength="16" autocomplete="off">
    </div>
    <div class="campo">
      <label>Tu equipo</label>
      <select id="select-equipo2">
        <option value="0">🔵 Equipo Azul</option>
        <option value="1">🔴 Equipo Rojo</option>
      </select>
    </div>
    <div class="campo">
      <label>Código de sala</label>
      <input type="text" id="input-codigo" placeholder="ABCD"
        maxlength="6" autocomplete="off"
        style="text-transform:uppercase;letter-spacing:4px;font-size:1.4rem;text-align:center">
    </div>
    <button class="btn btn-primario" onclick="unirseASala()">Unirse</button>
    <button class="btn btn-secundario" onclick="mostrarInicio()">← Volver</button>
  </div>

  <div id="vista-sala" class="card hidden">
    <h2>Sala de espera</h2>
    <p class="msg-info">Compartí este código:</p>
    <div class="sala-codigo" id="codigo-display"></div>
    <div style="margin-top:16px">
      <p class="msg-info" style="margin-bottom:10px">Jugadores (necesitás 4):</p>
      <div class="jugadores-lista" id="lista-jugadores"></div>
    </div>
    <div class="msg-info" id="msg-espera" style="margin-top:12px">Esperando jugadores...</div>
    <button class="btn btn-primario hidden" id="btn-empezar" onclick="empezarPartida()">¡Empezar!</button>
  </div>
</div>

<!-- JUEGO -->
<div id="pantalla-juego" class="hidden">
  <div class="game-header">
    <div class="game-title">TRUCO</div>
    <div class="puntaje-header">
      <div class="equipo-score">
        <div class="equipo-nombre">🔵 Azul</div>
        <div class="equipo-puntos" id="pts-azul">0</div>
      </div>
      <div class="score-sep">—</div>
      <div class="equipo-score">
        <div class="equipo-nombre">🔴 Rojo</div>
        <div class="equipo-puntos" id="pts-rojo">0</div>
      </div>
    </div>
  </div>

  <div class="turno-banner" id="turno-banner">Cargando...</div>
  <div class="canto-banner hidden" id="canto-banner"></div>

  <div class="mesa-zona">
    <div class="ronda-indicador" id="ronda-indicador">PRIMERA MANO</div>
    <div class="mesa-cartas" id="mesa-cartas">
      <span style="opacity:0.3;font-style:italic;font-size:0.9rem">Nadie jugó todavía</span>
    </div>
    <div class="resultado-ronda" id="resultado-ronda"></div>
  </div>

  <div class="acciones-zona" id="acciones-zona"></div>

  <div class="mis-cartas-zona">
    <div class="mi-nombre-label" id="mi-nombre-label"></div>
    <div class="mis-cartas" id="mis-cartas"></div>
  </div>
</div>

<!-- Notif -->
<div class="overlay hidden" id="overlay"></div>
<div class="notif hidden" id="notif">
  <h2 id="notif-titulo"></h2>
  <p id="notif-msg"></p>
  <button class="btn btn-primario" id="notif-btn">OK</button>
</div>

<script>
// ===== FIREBASE CONFIG =====
const firebaseConfig = {
  apiKey: "AIzaSyDyXAjXgSSZIQlauiZWTZEz9od9QydrNog",
  authDomain: "truco-amigos.firebaseapp.com",
  databaseURL: "https://truco-amigos-default-rtdb.firebaseio.com",
  projectId: "truco-amigos",
  storageBucket: "truco-amigos.firebasestorage.app",
  messagingSenderId: "971033179334",
  appId: "1:971033179334:web:7b3e4198fc90059f56d3c7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== ESTADO =====
let miId = null, miNombre = '', miEquipo = 0, salaId = null;
let soyCreador = false, juegoSuscrito = false;
let estadoLocal = null;

// ===== HELPERS =====
function generarId() { return Math.random().toString(36).substr(2,8); }
function generarCodigo() { return Math.random().toString(36).substr(2,4).toUpperCase(); }

const PALOS = ['espada','basto','oro','copa'];
const EMOJI = { espada:'⚔️', basto:'🌿', oro:'🪙', copa:'🏆' };
const JERARQUIA = {
  '1-espada':1,'1-basto':2,'7-espada':3,'7-oro':4,
  '3-espada':5,'3-basto':5,'3-oro':5,'3-copa':5,
  '2-espada':6,'2-basto':6,'2-oro':6,'2-copa':6,
  '1-oro':7,'1-copa':7,
  '12-espada':8,'12-basto':8,'12-oro':8,'12-copa':8,
  '11-espada':9,'11-basto':9,'11-oro':9,'11-copa':9,
  '10-espada':10,'10-basto':10,'10-oro':10,'10-copa':10,
  '7-basto':11,'7-copa':11,
  '6-espada':12,'6-basto':12,'6-oro':12,'6-copa':12,
  '5-espada':13,'5-basto':13,'5-oro':13,'5-copa':13,
  '4-espada':14,'4-basto':14,'4-oro':14,'4-copa':14,
};

function poderCarta(c) { return JERARQUIA[c.num+'-'+c.palo] || 15; }
function esRojo(p) { return p==='oro'||p==='copa'; }

function valorEnvido(n) { return n>=10 ? 0 : n; }
function calcularEnvido(cartas) {
  let mejor = 0;
  PALOS.forEach(p => {
    const del = cartas.filter(c=>c.palo===p);
    if (del.length>=2) {
      const vals = del.map(c=>valorEnvido(c.num)).sort((a,b)=>b-a);
      mejor = Math.max(mejor, 20+vals[0]+vals[1]);
    } else if (del.length===1) {
      mejor = Math.max(mejor, valorEnvido(del[0].num));
    }
  });
  return mejor;
}

function generarMazo() {
  const mazo = [];
  PALOS.forEach(p => [1,2,3,4,5,6,7,10,11,12].forEach(n => mazo.push({num:n,palo:p})));
  for (let i=mazo.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [mazo[i],mazo[j]]=[mazo[j],mazo[i]];
  }
  return mazo;
}

// ===== NOTIF =====
function mostrarNotif(titulo, msg, btnTxt, fn) {
  document.getElementById('notif-titulo').textContent = titulo;
  document.getElementById('notif-msg').textContent = msg;
  const b = document.getElementById('notif-btn');
  b.textContent = btnTxt || 'OK';
  b.onclick = fn || cerrarNotif;
  document.getElementById('notif').classList.remove('hidden');
  document.getElementById('overlay').classList.remove('hidden');
}
function cerrarNotif() {
  document.getElementById('notif').classList.add('hidden');
  document.getElementById('overlay').classList.add('hidden');
}

// ===== LOBBY =====
function mostrarUnirse() {
  document.getElementById('vista-inicio').classList.add('hidden');
  document.getElementById('vista-unirse').classList.remove('hidden');
}
function mostrarInicio() {
  document.getElementById('vista-unirse').classList.add('hidden');
  document.getElementById('vista-inicio').classList.remove('hidden');
}

function crearSala() {
  const nombre = document.getElementById('input-nombre').value.trim();
  const equipo = parseInt(document.getElementById('select-equipo').value);
  if (!nombre) { mostrarNotif('⚠️','Ingresá tu nombre'); return; }

  miId = generarId();
  miNombre = nombre;
  miEquipo = equipo;
  salaId = generarCodigo();
  soyCreador = true;

  db.ref('salas/'+salaId).set({
    creador: miId,
    estado: 'esperando',
    jugadores: { [miId]: {id:miId, nombre, equipo} },
    juego: null
  }).then(() => mostrarVistaSala())
    .catch(e => mostrarNotif('❌','Error al crear sala: '+e.message));
}

function unirseASala() {
  const nombre = document.getElementById('input-nombre2').value.trim();
  const equipo = parseInt(document.getElementById('select-equipo2').value);
  const codigo = document.getElementById('input-codigo').value.trim().toUpperCase();
  if (!nombre) { mostrarNotif('⚠️','Ingresá tu nombre'); return; }
  if (!codigo) { mostrarNotif('⚠️','Ingresá el código de sala'); return; }

  db.ref('salas/'+codigo).once('value').then(snap => {
    if (!snap.exists()) { mostrarNotif('❌','Sala no encontrada'); return; }
    const sala = snap.val();
    const jugadores = sala.jugadores || {};
    if (Object.keys(jugadores).length >= 4) { mostrarNotif('❌','La sala está llena'); return; }

    miId = generarId();
    miNombre = nombre;
    miEquipo = equipo;
    salaId = codigo;

    db.ref('salas/'+salaId+'/jugadores/'+miId).set({id:miId, nombre, equipo})
      .then(() => mostrarVistaSala())
      .catch(e => mostrarNotif('❌','Error al unirse: '+e.message));
  }).catch(e => mostrarNotif('❌','Error: '+e.message));
}

function mostrarVistaSala() {
  document.getElementById('vista-inicio').classList.add('hidden');
  document.getElementById('vista-unirse').classList.add('hidden');
  document.getElementById('vista-sala').classList.remove('hidden');
  document.getElementById('codigo-display').textContent = salaId;
  escucharSala();
}

function escucharSala() {
  db.ref('salas/'+salaId).on('value', snap => {
    if (!snap.exists()) return;
    const sala = snap.val();

    if (sala.estado === 'jugando' && !juegoSuscrito) {
      juegoSuscrito = true;
      escucharJuego();
      return;
    }

    if (sala.estado === 'jugando') return;

    // Mostrar lista de jugadores
    const jugadores = sala.jugadores || {};
    const lista = document.getElementById('lista-jugadores');
    lista.innerHTML = '';
    const porEquipo = [[],[]];
    Object.values(jugadores).forEach(j => porEquipo[j.equipo] && porEquipo[j.equipo].push(j));

    for (let eq=0;eq<2;eq++) {
      for (let i=0;i<2;i++) {
        const j = porEquipo[eq][i];
        const div = document.createElement('div');
        div.className = 'jugador-item equipo-'+eq+(j?'':' vacio');
        if (j) {
          div.innerHTML = '<div class="jugador-avatar">'+j.nombre[0].toUpperCase()+'</div>'
            +'<span>'+j.nombre+(j.id===miId?' (vos)':'')+'</span>'
            +'<span class="badge-equipo e'+eq+'">'+(eq===0?'Azul':'Rojo')+'</span>';
        } else {
          div.innerHTML = '<div class="jugador-avatar">?</div><span>Esperando...</span>'
            +'<span class="badge-equipo e'+eq+'">'+(eq===0?'Azul':'Rojo')+'</span>';
        }
        lista.appendChild(div);
      }
    }

    const total = Object.keys(jugadores).length;
    const msg = document.getElementById('msg-espera');
    const btn = document.getElementById('btn-empezar');
    if (total < 4) {
      msg.textContent = 'Esperando jugadores... ('+total+'/4)';
      btn.classList.add('hidden');
    } else {
      msg.textContent = soyCreador ? 'Todo listo. ¡Empezá la partida!' : 'Todo listo. Esperando que el creador empiece.';
      if (soyCreador) btn.classList.remove('hidden');
    }
  });
}

function empezarPartida() {
  db.ref('salas/'+salaId+'/jugadores').once('value').then(snap => {
    const jugadores = Object.values(snap.val());
    iniciarNuevaRonda(jugadores, [0,0]);
  });
}

// ===== JUEGO =====
function iniciarNuevaRonda(jugadores, puntos) {
  const mazo = generarMazo();
  const porEquipo = [[],[]];
  jugadores.forEach(j => porEquipo[j.equipo] && porEquipo[j.equipo].push(j));

  // Orden alternado entre equipos
  const orden = [];
  for (let i=0;i<2;i++) {
    if (porEquipo[0][i]) orden.push(porEquipo[0][i].id);
    if (porEquipo[1][i]) orden.push(porEquipo[1][i].id);
  }

  const manos = {};
  jugadores.forEach((j,idx) => {
    manos[j.id] = [mazo[idx*3], mazo[idx*3+1], mazo[idx*3+2]];
  });

  const jugadoresObj = {};
  jugadores.forEach(j => { jugadoresObj[j.id] = j; });

  const estado = {
    jugadores: jugadoresObj, orden, puntos, manos,
    cartasEnMesa: [],
    manoActual: 0,
    resultadoManos: [],
    turnoIdx: 0,
    truco: { estado:'sin_cantar', cantadoPor:null, nivel:0 },
    envido: { estado:'sin_cantar', cantadoPor:null, nivel:0 },
    faseEnvido: 'disponible',
    finMano: false,
    finPartida: false,
    ganadorPartida: null,
  };

  db.ref('salas/'+salaId).update({ estado:'jugando', juego:estado });
}

function escucharJuego() {
  db.ref('salas/'+salaId+'/juego').on('value', snap => {
    if (!snap.exists()) return;
    estadoLocal = snap.val();
    renderJuego();
  });
}

function renderJuego() {
  const e = estadoLocal;
  if (!e) return;

  document.getElementById('pantalla-lobby').classList.add('hidden');
  document.getElementById('pantalla-juego').classList.remove('hidden');

  if (e.finPartida) {
    const nombre = e.ganadorPartida===0 ? '🔵 Equipo Azul' : '🔴 Equipo Rojo';
    mostrarNotif('🏆 ¡Ganaron!', nombre+' ganó la partida', 'Nueva partida', () => {
      cerrarNotif();
      iniciarNuevaRonda(Object.values(e.jugadores), [0,0]);
    });
    return;
  }

  document.getElementById('pts-azul').textContent = e.puntos[0];
  document.getElementById('pts-rojo').textContent = e.puntos[1];

  const turnoJug = e.jugadores[e.orden[e.turnoIdx]];
  const esMiTurno = e.orden[e.turnoIdx] === miId;
  const tb = document.getElementById('turno-banner');
  tb.innerHTML = esMiTurno
    ? '<span class="turno-yo">Tu turno, '+miNombre+'</span>'
    : 'Turno de '+(turnoJug ? turnoJug.nombre : '...');

  const rondas = ['PRIMERA MANO','SEGUNDA MANO','TERCERA MANO'];
  document.getElementById('ronda-indicador').textContent = rondas[e.manoActual]||'';

  renderCantoBanner(e);
  renderMesa(e);
  renderResultados(e);
  renderMisCartas(e);
  renderAcciones(e, esMiTurno);

  if (e.finMano) setTimeout(() => procesarFinMano(e), 1500);
}

function renderCantoBanner(e) {
  const el = document.getElementById('canto-banner');
  const t = e.truco, ev = e.envido;
  const trucoEspera = ['cantado','retrucando','valecuatrando'].includes(t.estado);
  const envidoEspera = ev.estado === 'cantado';

  if (trucoEspera) {
    const niveles = ['','Truco','Re-truco','Vale cuatro'];
    const quien = e.jugadores[t.cantadoPor];
    el.innerHTML = '🃏 <strong>'+(quien?quien.nombre:'?')+'</strong> cantó <strong>'+niveles[t.nivel]+'</strong>';
    el.classList.remove('hidden');
  } else if (envidoEspera) {
    const niveles = ['','Envido','Envido Envido','Real envido','Falta envido'];
    const quien = e.jugadores[ev.cantadoPor];
    el.innerHTML = '🎲 <strong>'+(quien?quien.nombre:'?')+'</strong> cantó <strong>'+niveles[ev.nivel]+'</strong>';
    el.classList.remove('hidden');
  } else {
    el.classList.add('hidden');
  }
}

function renderMesa(e) {
  const el = document.getElementById('mesa-cartas');
  el.innerHTML = '';
  const cartas = (e.cartasEnMesa||[]).filter(c=>c.mano===e.manoActual);
  if (!cartas.length) {
    el.innerHTML = '<span style="opacity:0.3;font-style:italic;font-size:0.9rem">Nadie jugó todavía</span>';
    return;
  }
  cartas.forEach(jug => {
    const j = e.jugadores[jug.jugadorId];
    const div = document.createElement('div');
    div.className = 'jugada-en-mesa';
    div.innerHTML = cartaMesaHTML(jug.carta)+'<div class="jugada-nombre">'+(j?j.nombre:'')+'</div>';
    el.appendChild(div);
  });
}

function cartaMesaHTML(c) {
  const r = esRojo(c.palo) ? ' rojo' : '';
  return '<div class="carta-mesa">'
    +'<div class="carta-num'+r+'">'+c.num+'</div>'
    +'<div class="carta-palo">'+EMOJI[c.palo]+'</div>'
    +'<div class="carta-num-bot'+r+'">'+c.num+'</div>'
    +'</div>';
}

function renderResultados(e) {
  const el = document.getElementById('resultado-ronda');
  if (!e.resultadoManos || !e.resultadoManos.length) { el.textContent=''; return; }
  el.textContent = e.resultadoManos.map((r,i) => {
    const l = ['1ª','2ª','3ª'][i];
    if (r==='empate') return l+': Empate';
    return l+': '+(r===0?'🔵 Azul':'🔴 Rojo');
  }).join('  ·  ');
}

function renderMisCartas(e) {
  const el = document.getElementById('mis-cartas');
  el.innerHTML = '';
  document.getElementById('mi-nombre-label').textContent = miNombre;
  const misCartas = e.manos[miId] || [];
  const jugadas = new Set((e.cartasEnMesa||[]).filter(c=>c.jugadorId===miId).map(c=>c.cartaIdx));

  misCartas.forEach((carta, idx) => {
    const div = document.createElement('div');
    const yajugada = jugadas.has(idx);
    div.className = 'carta'+(yajugada?' jugada':'');
    const r = esRojo(carta.palo) ? ' rojo' : '';
    div.innerHTML = '<div class="carta-num'+r+'">'+carta.num+'</div>'
      +'<div class="carta-palo">'+EMOJI[carta.palo]+'</div>'
      +'<div class="carta-num-bot'+r+'">'+carta.num+'</div>';
    if (!yajugada) div.addEventListener('click', () => jugarCarta(idx));
    el.appendChild(div);
  });
}

function renderAcciones(e, esMiTurno) {
  const el = document.getElementById('acciones-zona');
  el.innerHTML = '';
  const t = e.truco, ev = e.envido;
  const miEq = e.jugadores[miId] ? e.jugadores[miId].equipo : -1;

  const trucoEspera = ['cantado','retrucando','valecuatrando'].includes(t.estado);
  const envidoEspera = ev.estado === 'cantado';
  const cantadorEq = trucoEspera ? (e.jugadores[t.cantadoPor]||{}).equipo
    : envidoEspera ? (e.jugadores[ev.cantadoPor]||{}).equipo : -1;
  const debeResponder = (trucoEspera||envidoEspera) && cantadorEq !== miEq;

  if (debeResponder) {
    el.appendChild(mkBtn('✅ Quiero','btn-quiero',()=>responderCanto('quiero',e)));
    el.appendChild(mkBtn('❌ No quiero','btn-noquiero',()=>responderCanto('noquiero',e)));
    if (trucoEspera && t.nivel < 3) {
      const subs = ['','','Re-truco','Vale cuatro'];
      el.appendChild(mkBtn(subs[t.nivel+1],'btn-truco',()=>cantarTruco(t.nivel+1)));
    }
    if (envidoEspera) {
      if (ev.nivel < 3) el.appendChild(mkBtn('Real envido','btn-envido',()=>cantarEnvido(3)));
      el.appendChild(mkBtn('Falta envido','btn-envido',()=>cantarEnvido(4)));
    }
    return;
  }

  if (!esMiTurno) return;

  if (t.estado==='sin_cantar') el.appendChild(mkBtn('Truco','btn-truco',()=>cantarTruco(1)));
  else if (t.estado==='aceptado' && t.nivel<3) {
    const subs=['','','Re-truco','Vale cuatro'];
    el.appendChild(mkBtn(subs[t.nivel+1],'btn-truco',()=>cantarTruco(t.nivel+1)));
  }

  if (e.manoActual===0 && e.faseEnvido==='disponible') {
    el.appendChild(mkBtn('Envido','btn-envido',()=>cantarEnvido(1)));
    el.appendChild(mkBtn('Real envido','btn-envido',()=>cantarEnvido(3)));
    el.appendChild(mkBtn('Falta envido','btn-envido',()=>cantarEnvido(4)));
  }

  el.appendChild(mkBtn('Ir al mazo','btn-mazo',()=>irAlMazo(e)));
}

function mkBtn(txt, cls, fn) {
  const b = document.createElement('button');
  b.className = 'btn-accion '+cls;
  b.textContent = txt;
  b.addEventListener('click', fn);
  return b;
}

// ===== ACCIONES =====
function jugarCarta(idx) {
  const e = estadoLocal;
  if (!e || e.orden[e.turnoIdx] !== miId) return;
  if (['cantado','retrucando','valecuatrando'].includes(e.truco.estado)) return;
  if (e.envido.estado === 'cantado') return;

  const jugadas = new Set((e.cartasEnMesa||[]).filter(c=>c.jugadorId===miId).map(c=>c.cartaIdx));
  if (jugadas.has(idx)) return;

  const carta = e.manos[miId][idx];
  const nuevasCartas = [...(e.cartasEnMesa||[]), {jugadorId:miId, carta, cartaIdx:idx, mano:e.manoActual}];
  const nuevoTurnoIdx = (e.turnoIdx+1) % e.orden.length;
  const jugadasEstaMano = nuevasCartas.filter(c=>c.mano===e.manoActual);
  const finMano = jugadasEstaMano.length === e.orden.length;

  db.ref('salas/'+salaId+'/juego').update({
    cartasEnMesa: nuevasCartas,
    turnoIdx: nuevoTurnoIdx,
    finMano,
    faseEnvido: e.manoActual===0 ? 'resuelto' : e.faseEnvido,
  });
}

function cantarTruco(nivel) {
  const estados = {1:'cantado',2:'retrucando',3:'valecuatrando'};
  db.ref('salas/'+salaId+'/juego/truco').update({estado:estados[nivel]||'cantado', cantadoPor:miId, nivel});
}

function cantarEnvido(nivel) {
  db.ref('salas/'+salaId+'/juego/envido').update({estado:'cantado', cantadoPor:miId, nivel});
  db.ref('salas/'+salaId+'/juego').update({faseEnvido:'cantado'});
}

function responderCanto(resp, e) {
  const t = e.truco, ev = e.envido;
  const trucoEspera = ['cantado','retrucando','valecuatrando'].includes(t.estado);

  if (trucoEspera) {
    if (resp==='quiero') {
      db.ref('salas/'+salaId+'/juego/truco').update({estado:'aceptado'});
    } else {
      const ganEq = (e.jugadores[t.cantadoPor]||{}).equipo || 0;
      const pts = t.nivel>1 ? t.nivel-1 : 1;
      sumarPuntos(ganEq, pts, e, 'truco_resuelto');
    }
  } else if (ev.estado==='cantado') {
    if (resp==='quiero') {
      resolverEnvido(e);
    } else {
      const ganEq = (e.jugadores[ev.cantadoPor]||{}).equipo || 0;
      const ptsMap = [0,1,2,3,3,0];
      sumarPuntos(ganEq, ptsMap[ev.nivel]||1, e, 'envido_resuelto');
    }
  }
}

function resolverEnvido(e) {
  const porEquipo = [[],[]];
  Object.entries(e.manos).forEach(([jId, cartas]) => {
    const eq = (e.jugadores[jId]||{}).equipo;
    if (eq!==undefined) porEquipo[eq].push(calcularEnvido(cartas));
  });
  const pe0 = Math.max(...porEquipo[0]);
  const pe1 = Math.max(...porEquipo[1]);
  const ganEq = pe0 >= pe1 ? 0 : 1;
  const nivel = e.envido.nivel;
  let pts = nivel<=1 ? 2 : nivel===2 ? 4 : nivel===3 ? 3 : Math.max(1, 30-e.puntos[ganEq]);
  sumarPuntos(ganEq, pts, e, 'envido_resuelto');
}

function irAlMazo(e) {
  const miEq = (e.jugadores[miId]||{}).equipo;
  const contrario = miEq===0 ? 1 : 0;
  const pts = e.truco.estado==='aceptado' ? e.truco.nivel : 1;
  sumarPuntos(contrario, pts, e, 'mazo');
}

function sumarPuntos(eq, pts, e, motivo) {
  const nuevos = [...e.puntos];
  nuevos[eq] += pts;
  const fin = nuevos[0]>=30 || nuevos[1]>=30;
  const upd = { puntos:nuevos, finPartida:fin, ganadorPartida: fin?eq:null };
  if (motivo==='envido_resuelto') {
    upd.faseEnvido = 'resuelto';
    upd['envido/estado'] = 'resuelto';
  }
  if (motivo==='truco_resuelto') upd['truco/estado'] = 'resuelto';
  db.ref('salas/'+salaId+'/juego').update(upd);
}

// ===== FIN DE MANO =====
function procesarFinMano(e) {
  // Solo el jugador con turnoIdx===0 procesa para evitar doble escritura
  if (e.orden[0] !== miId) return;

  const jugadas = (e.cartasEnMesa||[]).filter(c=>c.mano===e.manoActual);
  const ganador = resolverMano(jugadas, e.jugadores);
  const nuevosRes = [...(e.resultadoManos||[]), ganador];
  const nuevaMano = e.manoActual + 1;
  const ganadorRonda = resolverRonda(nuevosRes);

  if (ganadorRonda !== null || nuevaMano >= 3) {
    const eq = ganadorRonda !== null ? ganadorRonda : 0;
    const ptsTruco = e.truco.estado==='aceptado' ? e.truco.nivel : 1;
    const nuevos = [...e.puntos];
    nuevos[eq] += ptsTruco;
    const fin = nuevos[0]>=30 || nuevos[1]>=30;

    if (fin) {
      db.ref('salas/'+salaId+'/juego').update({
        resultadoManos: nuevosRes, finPartida:true,
        ganadorPartida:eq, puntos:nuevos, finMano:false
      });
    } else {
      db.ref('salas/'+salaId+'/juego').update({
        resultadoManos: nuevosRes, puntos:nuevos, finMano:false
      });
      setTimeout(() => iniciarNuevaRonda(Object.values(e.jugadores), nuevos), 2000);
    }
  } else {
    db.ref('salas/'+salaId+'/juego').update({
      manoActual: nuevaMano,
      resultadoManos: nuevosRes,
      turnoIdx: 0,
      finMano: false,
    });
  }
}

function resolverMano(jugadas, jugadores) {
  let mejor = null, empate = false;
  jugadas.forEach(j => {
    const p = poderCarta(j.carta);
    if (!mejor || p < poderCarta(mejor.carta)) { mejor=j; empate=false; }
    else if (p === poderCarta(mejor.carta)) empate=true;
  });
  if (empate) return 'empate';
  return (jugadores[mejor.jugadorId]||{}).equipo ?? 0;
}

function resolverRonda(res) {
  const g0 = res.filter(r=>r===0).length;
  const g1 = res.filter(r=>r===1).length;
  if (g0>=2) return 0;
  if (g1>=2) return 1;
  if (res[0]==='empate' && res.length>=2 && res[1]!=='empate') return res[1];
  if (res.length===3) return 0;
  return null;
}
</script>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Truco</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #1a3a1a;
    --verde-claro: #2d5a2d;
    --verde-mesa: #0f2a0f;
    --dorado: #c9a84c;
    --dorado-claro: #e8c96a;
    --crema: #f5e6c8;
    --rojo: #8b1a1a;
    --texto: #f0ddb0;
    --sombra: rgba(0,0,0,0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Crimson Pro', serif;
    background: var(--verde-mesa);
    color: var(--texto);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* ===== PANTALLA DE LOBBY ===== */
  #pantalla-lobby {
    width: 100%;
    max-width: 420px;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .titulo-lobby {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 2.8rem;
    color: var(--dorado);
    text-shadow: 0 0 30px rgba(201,168,76,0.4), 2px 2px 0 #000;
    letter-spacing: 2px;
    text-align: center;
  }

  .subtitulo {
    color: var(--dorado-claro);
    font-size: 1.1rem;
    font-style: italic;
    opacity: 0.8;
  }

  .card-lobby {
    background: linear-gradient(145deg, #1e4a1e, #142e14);
    border: 1px solid var(--dorado);
    border-radius: 12px;
    padding: 24px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,168,76,0.2);
  }

  .card-lobby h2 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 1rem;
    color: var(--dorado);
    margin-bottom: 16px;
    text-align: center;
  }

  .campo {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }

  .campo label {
    font-size: 0.85rem;
    color: var(--dorado-claro);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .campo input, .campo select {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--crema);
    font-family: 'Crimson Pro', serif;
    font-size: 1.1rem;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }

  .campo input:focus, .campo select:focus {
    border-color: var(--dorado);
  }

  .campo select option {
    background: #1a3a1a;
  }

  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-family: 'Cinzel Decorative', cursive;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .btn-primario {
    background: linear-gradient(135deg, var(--dorado), #a07830);
    color: #1a0a00;
    box-shadow: 0 4px 16px rgba(201,168,76,0.3);
  }

  .btn-primario:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-primario:active { transform: translateY(0); }

  .btn-secundario {
    background: transparent;
    color: var(--dorado);
    border: 1px solid var(--dorado);
    margin-top: 8px;
  }

  .separador {
    display: flex;
    align-items: center;
    gap: 12px;
    color: rgba(201,168,76,0.5);
    font-size: 0.85rem;
  }
  .separador::before, .separador::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(201,168,76,0.3);
  }

  .sala-codigo {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 2rem;
    color: var(--dorado-claro);
    text-align: center;
    letter-spacing: 6px;
    padding: 12px;
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    border: 1px dashed rgba(201,168,76,0.4);
  }

  .jugadores-lista {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .jugador-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    border-left: 3px solid transparent;
  }

  .jugador-item.equipo-0 { border-left-color: #4a9eff; }
  .jugador-item.equipo-1 { border-left-color: #ff6b6b; }
  .jugador-item.vacio { opacity: 0.4; font-style: italic; }

  .jugador-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    background: rgba(201,168,76,0.2);
  }

  .badge-equipo {
    margin-left: auto;
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-family: 'Cinzel Decorative', cursive;
  }
  .badge-equipo.e0 { background: rgba(74,158,255,0.2); color: #4a9eff; }
  .badge-equipo.e1 { background: rgba(255,107,107,0.2); color: #ff6b6b; }

  .msg-info {
    text-align: center;
    font-style: italic;
    color: var(--dorado-claro);
    opacity: 0.8;
    font-size: 0.95rem;
    padding: 8px;
  }

  /* ===== PANTALLA DE JUEGO ===== */
  #pantalla-juego {
    width: 100%;
    max-width: 480px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 0 0 16px 0;
    gap: 0;
  }

  /* Header */
  .game-header {
    background: linear-gradient(180deg, #0a1a0a, transparent);
    padding: 10px 16px 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .game-title {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 1.1rem;
    color: var(--dorado);
  }

  .puntaje-header {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .equipo-score {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .equipo-nombre {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.7;
  }

  .equipo-puntos {
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--dorado-claro);
  }

  .score-sep { color: var(--dorado); opacity: 0.5; font-size: 1.2rem; }

  /* Tantos display */
  .tantos-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 4px 16px;
  }

  .tanto-pip {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.5);
    background: transparent;
    transition: background 0.3s;
  }
  .tanto-pip.activo { background: var(--dorado); box-shadow: 0 0 6px rgba(201,168,76,0.6); }

  /* Mesa de juego - cartas jugadas */
  .mesa-zona {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 16px;
    gap: 12px;
  }

  .ronda-indicador {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 0.75rem;
    color: var(--dorado);
    letter-spacing: 2px;
    opacity: 0.8;
  }

  .mesa-cartas {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    min-height: 120px;
    align-items: center;
  }

  .jugada-en-mesa {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    animation: aparecer 0.3s ease;
  }

  @keyframes aparecer {
    from { opacity: 0; transform: translateY(-10px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .jugada-nombre {
    font-size: 0.7rem;
    opacity: 0.7;
    text-align: center;
    max-width: 70px;
  }

  /* Zona de acciones (truco/envido) */
  .acciones-zona {
    padding: 6px 16px;
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-accion {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid;
    font-family: 'Crimson Pro', serif;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
  }

  .btn-truco { border-color: #ff6b6b; color: #ff6b6b; }
  .btn-truco:hover { background: rgba(255,107,107,0.15); }
  .btn-envido { border-color: #4a9eff; color: #4a9eff; }
  .btn-envido:hover { background: rgba(74,158,255,0.15); }
  .btn-quiero { border-color: #4aff8c; color: #4aff8c; }
  .btn-quiero:hover { background: rgba(74,255,140,0.15); }
  .btn-noquiero { border-color: #ff6b6b; color: #ff6b6b; }
  .btn-noquiero:hover { background: rgba(255,107,107,0.15); }
  .btn-mazo { border-color: rgba(201,168,76,0.5); color: var(--dorado-claro); }
  .btn-mazo:hover { background: rgba(201,168,76,0.1); }

  .btn-accion:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Cartas del jugador */
  .mis-cartas-zona {
    padding: 8px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .mi-nombre-label {
    font-size: 0.75rem;
    color: var(--dorado-claro);
    opacity: 0.7;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .mis-cartas {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  /* ===== CARTA ===== */
  .carta {
    width: 70px;
    height: 105px;
    border-radius: 8px;
    background: var(--crema);
    border: 2px solid #d4b896;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 6px 4px;
    cursor: pointer;
    position: relative;
    box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
    transition: transform 0.2s, box-shadow 0.2s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .carta:hover:not(.jugada):not(.dorso) {
    transform: translateY(-8px);
    box-shadow: 3px 10px 20px rgba(0,0,0,0.6);
  }

  .carta.jugada {
    opacity: 0.4;
    cursor: default;
    transform: none !important;
  }

  .carta.dorso {
    background: linear-gradient(135deg, #1a3a1a, #0d1f0d);
    border-color: var(--dorado);
    cursor: default;
  }

  .carta-num {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 1.1rem;
    color: #1a0a00;
    line-height: 1;
  }

  .carta-num.rojo { color: var(--rojo); }

  .carta-palo {
    font-size: 1.8rem;
    line-height: 1;
  }

  .carta-num-bot {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 1.1rem;
    color: #1a0a00;
    line-height: 1;
    transform: rotate(180deg);
  }

  .carta-num-bot.rojo { color: var(--rojo); }

  .dorso-pattern {
    font-size: 2rem;
    opacity: 0.3;
    color: var(--dorado);
  }

  /* Carta en mesa (más pequeña) */
  .carta-mesa {
    width: 55px;
    height: 82px;
    border-radius: 6px;
    background: var(--crema);
    border: 2px solid #d4b896;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 4px 3px;
    box-shadow: 2px 2px 8px rgba(0,0,0,0.5);
  }

  .carta-mesa .carta-num { font-size: 0.85rem; }
  .carta-mesa .carta-palo { font-size: 1.3rem; }
  .carta-mesa .carta-num-bot { font-size: 0.85rem; }

  /* Notificaciones */
  .notif {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: linear-gradient(135deg, #1e4a1e, #0f2a0f);
    border: 2px solid var(--dorado);
    border-radius: 16px;
    padding: 24px 32px;
    text-align: center;
    z-index: 100;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    animation: popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
    max-width: 90vw;
  }

  @keyframes popIn {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
    to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }

  .notif h2 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 1.4rem;
    color: var(--dorado);
    margin-bottom: 10px;
  }

  .notif p {
    color: var(--texto);
    font-size: 1.1rem;
    margin-bottom: 16px;
  }

  .notif .btn { width: auto; padding: 10px 24px; font-size: 0.85rem; }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 99;
  }

  /* Turno indicator */
  .turno-banner {
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.15), transparent);
    border-top: 1px solid rgba(201,168,76,0.3);
    border-bottom: 1px solid rgba(201,168,76,0.3);
    text-align: center;
    padding: 6px;
    font-size: 0.85rem;
    color: var(--dorado-claro);
    font-style: italic;
    min-height: 32px;
  }

  /* Canto pendiente */
  .canto-banner {
    background: linear-gradient(90deg, transparent, rgba(74,158,255,0.15), transparent);
    border: 1px solid rgba(74,158,255,0.4);
    border-radius: 8px;
    margin: 0 16px;
    padding: 10px 16px;
    text-align: center;
    font-size: 1rem;
    color: #7bc8ff;
    display: none;
  }

  .canto-banner.visible { display: block; }

  /* Resultado ronda */
  .resultado-ronda {
    text-align: center;
    font-family: 'Cinzel Decorative', cursive;
    font-size: 0.8rem;
    color: var(--dorado);
    padding: 4px;
    min-height: 24px;
    letter-spacing: 2px;
  }

  /* Loading */
  .cargando {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    color: var(--dorado-claro);
    font-style: italic;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(201,168,76,0.2);
    border-top-color: var(--dorado);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .hidden { display: none !important; }

  /* Palos */
  .espada { color: #1a1a1a; }
  .basto { color: #2d4a1e; }
  .oro { color: #c9a84c; }
  .copa { color: #8b1a1a; }

  /* Jerarquía visual de carta */
  .carta-poder {
    position: absolute;
    top: 2px;
    right: 4px;
    font-size: 0.55rem;
    opacity: 0.4;
    color: var(--verde-claro);
  }

  .turno-yo { color: #4aff8c; font-weight: 600; }
</style>
</head>
<body>

<!-- ===== LOBBY ===== -->
<div id="pantalla-lobby">
  <div class="titulo-lobby">TRUCO</div>
  <div class="subtitulo">2 vs 2 · Argentina</div>

  <div id="vista-inicio" class="card-lobby">
    <h2>Nueva Partida</h2>
    <div class="campo">
      <label>Tu nombre</label>
      <input type="text" id="input-nombre" placeholder="Ej: Claudio" maxlength="16" autocomplete="off">
    </div>
    <div class="campo">
      <label>Tu equipo</label>
      <select id="select-equipo">
        <option value="0">🔵 Equipo Azul</option>
        <option value="1">🔴 Equipo Rojo</option>
      </select>
    </div>
    <button class="btn btn-primario" onclick="crearSala()">Crear sala</button>
    <div class="separador" style="margin-top:12px">o</div>
    <button class="btn btn-secundario" onclick="mostrarUnirse()">Unirse a sala existente</button>
  </div>

  <div id="vista-unirse" class="card-lobby hidden">
    <h2>Unirse a sala</h2>
    <div class="campo">
      <label>Tu nombre</label>
      <input type="text" id="input-nombre2" placeholder="Ej: Marcelo" maxlength="16" autocomplete="off">
    </div>
    <div class="campo">
      <label>Tu equipo</label>
      <select id="select-equipo2">
        <option value="0">🔵 Equipo Azul</option>
        <option value="1">🔴 Equipo Rojo</option>
      </select>
    </div>
    <div class="campo">
      <label>Código de sala</label>
      <input type="text" id="input-codigo" placeholder="Ej: ABCD" maxlength="6" autocomplete="off" style="text-transform:uppercase;letter-spacing:4px;font-size:1.4rem;text-align:center">
    </div>
    <button class="btn btn-primario" onclick="unirseASala()">Unirse</button>
    <button class="btn btn-secundario" onclick="mostrarInicio()">← Volver</button>
  </div>

  <div id="vista-sala" class="card-lobby hidden">
    <h2>Sala de espera</h2>
    <p class="msg-info">Compartí este código con tus amigos:</p>
    <div class="sala-codigo" id="codigo-display"></div>
    <div style="margin-top:16px">
      <p class="msg-info" style="margin-bottom:10px">Jugadores (necesitás 4):</p>
      <div class="jugadores-lista" id="lista-jugadores"></div>
    </div>
    <div class="msg-info" id="msg-espera" style="margin-top:12px">Esperando jugadores...</div>
    <button class="btn btn-primario hidden" id="btn-empezar" onclick="empezarPartida()">¡Empezar!</button>
  </div>
</div>

<!-- ===== JUEGO ===== -->
<div id="pantalla-juego" class="hidden">
  <div class="game-header">
    <div class="game-title">TRUCO</div>
    <div class="puntaje-header">
      <div class="equipo-score">
        <div class="equipo-nombre">🔵 Azul</div>
        <div class="equipo-puntos" id="pts-azul">0</div>
      </div>
      <div class="score-sep">—</div>
      <div class="equipo-score">
        <div class="equipo-nombre">🔴 Rojo</div>
        <div class="equipo-puntos" id="pts-rojo">0</div>
      </div>
    </div>
  </div>

  <div class="tantos-row" id="tantos-row"></div>

  <div class="turno-banner" id="turno-banner">Esperando...</div>

  <div class="canto-banner" id="canto-banner"></div>

  <div class="mesa-zona">
    <div class="ronda-indicador" id="ronda-indicador">PRIMERA MANO</div>
    <div class="mesa-cartas" id="mesa-cartas"></div>
    <div class="resultado-ronda" id="resultado-ronda"></div>
  </div>

  <div class="acciones-zona" id="acciones-zona"></div>

  <div class="mis-cartas-zona">
    <div class="mi-nombre-label" id="mi-nombre-label"></div>
    <div class="mis-cartas" id="mis-cartas"></div>
  </div>
</div>

<!-- Notificación -->
<div class="overlay hidden" id="overlay"></div>
<div class="notif hidden" id="notif">
  <h2 id="notif-titulo"></h2>
  <p id="notif-msg"></p>
  <button class="btn btn-primario" id="notif-btn" onclick="cerrarNotif()">OK</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, push, off } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDyXAjXgSSZIQlauiZWTZEz9od9QydrNog",
  authDomain: "truco-amigos.firebaseapp.com",
  databaseURL: "https://truco-amigos-default-rtdb.firebaseio.com",
  projectId: "truco-amigos",
  storageBucket: "truco-amigos.firebasestorage.app",
  messagingSenderId: "971033179334",
  appId: "1:971033179334:web:7b3e4198fc90059f56d3c7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ===== ESTADO LOCAL =====
let miId = null;
let miNombre = '';
let miEquipo = 0;
let salaId = null;
let salaRef = null;
let estadoLocal = null;
let soyCreador = false;
let listeners = [];

// ===== MAZO Y JERARQUÍA =====
const PALOS = ['espada', 'basto', 'oro', 'copa'];
const PALO_EMOJI = { espada: '⚔️', basto: '🌿', oro: '🪙', copa: '🏆' };
const PALO_CLASS = { espada: 'espada', basto: 'basto', oro: 'oro', copa: 'copa' };

// Jerarquía del truco (1=mayor, 14=menor)
const JERARQUIA = {
  '1-espada': 1, '1-basto': 2, '7-espada': 3, '7-oro': 4,
  '3-espada': 5, '3-basto': 5, '3-oro': 5, '3-copa': 5,
  '2-espada': 6, '2-basto': 6, '2-oro': 6, '2-copa': 6,
  '1-oro': 7, '1-copa': 7,
  '12-espada': 8, '12-basto': 8, '12-oro': 8, '12-copa': 8,
  '11-espada': 9, '11-basto': 9, '11-oro': 9, '11-copa': 9,
  '10-espada': 10, '10-basto': 10, '10-oro': 10, '10-copa': 10,
  '7-basto': 11, '7-copa': 11,
  '6-espada': 12, '6-basto': 12, '6-oro': 12, '6-copa': 12,
  '5-espada': 13, '5-basto': 13, '5-oro': 13, '5-copa': 13,
  '4-espada': 14, '4-basto': 14, '4-oro': 14, '4-copa': 14,
};

function poderCarta(c) {
  const k = `${c.num}-${c.palo}`;
  return JERARQUIA[k] || 15;
}

// Envido: valor de carta
function valorEnvido(num) {
  if (num >= 10) return 0;
  return num;
}

// Calcular puntos envido de 3 cartas
function calcularEnvido(cartas) {
  let mejor = 0;
  for (let p of PALOS) {
    const del_palo = cartas.filter(c => c.palo === p);
    if (del_palo.length >= 2) {
      const vals = del_palo.map(c => valorEnvido(c.num)).sort((a,b)=>b-a);
      const pts = 20 + vals[0] + vals[1];
      mejor = Math.max(mejor, pts);
    } else if (del_palo.length === 1) {
      mejor = Math.max(mejor, valorEnvido(del_palo[0].num));
    }
  }
  return mejor;
}

function generarMazo() {
  const mazo = [];
  for (const palo of PALOS) {
    for (const num of [1,2,3,4,5,6,7,10,11,12]) {
      mazo.push({ num, palo });
    }
  }
  // Fisher-Yates
  for (let i = mazo.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [mazo[i], mazo[j]] = [mazo[j], mazo[i]];
  }
  return mazo;
}

function generarId() {

}

function generarCodigo() {

}

// ===== LÓGICA DEL JUEGO =====
async function iniciarNuevaRonda(jugadores, puntos) {
  const mazo = generarMazo();
  // Repartir 3 cartas a cada jugador (orden por equipo)
  const porEquipo = [[], []];
  jugadores.forEach(j => porEquipo[j.equipo].push(j));

  // Orden de turno: alternado entre equipos
  const orden = [];
  for (let i = 0; i < 2; i++) {
    if (porEquipo[0][i]) orden.push(porEquipo[0][i].id);
    if (porEquipo[1][i]) orden.push(porEquipo[1][i].id);
  }

  const manos = {};
  jugadores.forEach((j, idx) => {
    manos[j.id] = [mazo[idx*3], mazo[idx*3+1], mazo[idx*3+2]];
  });

  const jugadoresObj = {};
  jugadores.forEach(j => { jugadoresObj[j.id] = j; });

  const estado = {
    jugadores: jugadoresObj,
    orden,
    puntos, // [azul, rojo]
    manos,  // cartas de cada jugador (privado conceptualmente)
    cartasJugadas: {}, // { [jugadaId]: { jugadorId, carta, mano } }
    manoActual: 0, // 0, 1, 2
    resultadoManos: [], // ['azul','rojo','empate']
    turnoIdx: 0,
    truco: { estado: 'sin_cantar', cantadoPor: null, nivel: 0 },
    // nivel: 0=nada, 1=truco, 2=retruco, 3=valecuatro
    envido: { estado: 'sin_cantar', cantadoPor: null, nivel: 0, puntos: 0 },
    // nivel: 0=nada, 1=envido, 2=envido-envido, 3=realenvido, 4=faltaenvido
    faseEnvido: 'disponible', // 'disponible','cantado','resuelto'
    cartasEnMesa: [], // [{ jugadorId, carta, mano }]
    ganadorMano: null,
    finMano: false,
    finPartida: false,
    ganadorPartida: null,
  };

  await update(ref(db, `salas/${salaId}`), {
    estado: 'jugando',
    juego: estado
  });
}

function renderJuego() {
  const estado = estadoLocal;
  if (!estado) return;

  // Cambiar pantalla
  document.getElementById('pantalla-lobby').classList.add('hidden');
  document.getElementById('pantalla-juego').classList.remove('hidden');

  // Si terminó la partida
  if (estado.finPartida) {
    const ganEquipo = estado.ganadorPartida;
    const nombre = ganEquipo === 0 ? '🔵 Equipo Azul' : '🔴 Equipo Rojo';
    mostrarNotif('🏆 ¡Ganaron!', `${nombre} ganó la partida`, 'Nueva partida', async () => {
      const jugadores = Object.values(estado.jugadores);
      await iniciarNuevaRonda(jugadores, [0, 0]);
    });
    return;
  }

  // Puntajes
  document.getElementById('pts-azul').textContent = estado.puntos[0];
  document.getElementById('pts-rojo').textContent = estado.puntos[1];

  // Tantos
  renderTantos(estado.puntos);

  // Mi label
  document.getElementById('mi-nombre-label').textContent = miNombre;

  // Turno
  const turnoJugador = estado.jugadores[estado.orden[estado.turnoIdx]];
  const esMiTurno = estado.orden[estado.turnoIdx] === miId;
  const turnoEl = document.getElementById('turno-banner');
  if (esMiTurno) {
    turnoEl.innerHTML = `<span class="turno-yo">Tu turno, ${miNombre}</span>`;
  } else {
    turnoEl.textContent = `Turno de ${turnoJugador?.nombre || '...'}`;
  }

  // Ronda
  const rondas = ['PRIMERA MANO', 'SEGUNDA MANO', 'TERCERA MANO'];
  document.getElementById('ronda-indicador').textContent = rondas[estado.manoActual] || '';

  // Cartas en mesa
  renderMesa(estado);

  // Resultado manos anteriores
  renderResultadoManos(estado);

  // Canto pendiente
  renderCantoPendiente(estado);

  // Mis cartas
  renderMisCartas(estado);

  // Acciones
  renderAcciones(estado, esMiTurno);

  // Fin de mano
  if (estado.finMano) {
    manejarFinMano(estado);
  }
}

function renderAcciones(estado, esMiTurno) {
  const el = document.getElementById('acciones-zona');
  el.innerHTML = '';

  const truco = estado.truco;
  const envido = estado.envido;
  const miEquipoLocal = estado.jugadores[miId]?.equipo;

  // ¿Responder a canto pendiente?
  const trucoEsperaRespuesta = (truco.estado === 'cantado' || truco.estado === 'retrucando' || truco.estado === 'valecuatrando');
  const envidoEsperaRespuesta = envido.estado === 'cantado';
  const cantadorEquipo = trucoEsperaRespuesta ? estado.jugadores[truco.cantadoPor]?.equipo : (envidoEsperaRespuesta ? estado.jugadores[envido.cantadoPor]?.equipo : null);
  const debeResponder = (trucoEsperaRespuesta || envidoEsperaRespuesta) && cantadorEquipo !== miEquipoLocal;

  if (debeResponder) {
    // Botones quiero/no quiero
    const q = btn('✅ Quiero', 'btn-quiero', async () => await responderCanto('quiero'));
    const nq = btn('❌ No quiero', 'btn-noquiero', async () => await responderCanto('noquiero'));
    el.appendChild(q);
    el.appendChild(nq);

    // Si es truco y puede subir
    if (trucoEsperaRespuesta && truco.nivel < 3) {
      const subs = ['', '', 'Re-truco', 'Vale cuatro'];
      const sub = btn(subs[truco.nivel + 1] || '', 'btn-truco', async () => await cantarTruco(truco.nivel + 1));
      if (truco.nivel < 3) el.appendChild(sub);
    }
    if (envidoEsperaRespuesta) {
      // puede subir envido
      if (envido.nivel < 3) {
        const subE = btn('Real envido', 'btn-envido', async () => await cantarEnvido(3));
        el.appendChild(subE);
      }
      if (envido.nivel < 4) {
        const fe = btn('Falta envido', 'btn-envido', async () => await cantarEnvido(4));
        el.appendChild(fe);
      }
    }
    return;
  }

  if (!esMiTurno) return;

  // Cantar truco
  if (truco.estado === 'sin_cantar') {
    el.appendChild(btn('Truco', 'btn-truco', async () => await cantarTruco(1)));
  } else if (truco.estado === 'aceptado' && truco.nivel < 3 && truco.cantadoPor !== miId) {
    const subs = ['', '', 'Re-truco', 'Vale cuatro'];
    el.appendChild(btn(subs[truco.nivel + 1], 'btn-truco', async () => await cantarTruco(truco.nivel + 1)));
  }

  // Cantar envido (solo en primera mano)
  if (estado.manoActual === 0 && estado.faseEnvido === 'disponible') {
    el.appendChild(btn('Envido', 'btn-envido', async () => await cantarEnvido(1)));
    el.appendChild(btn('Real envido', 'btn-envido', async () => await cantarEnvido(3)));
    el.appendChild(btn('Falta envido', 'btn-envido', async () => await cantarEnvido(4)));
  }

  // Ir al mazo
  el.appendChild(btn('Ir al mazo', 'btn-mazo', async () => await irAlMazo()));
}

  b.className = `btn-accion ${cls}`;
  b.textContent = texto;

  return b;

// ===== ACCIONES DE JUEGO =====
async function jugarCarta(idx) {
  const estado = estadoLocal;
  if (!estado) return;
  if (estado.orden[estado.turnoIdx] !== miId) return;

  // Verificar que no haya canto pendiente
  if (estado.truco.estado === 'cantado' || estado.truco.estado === 'retrucando' || estado.truco.estado === 'valecuatrando') return;
  if (estado.envido.estado === 'cantado') return;

  // Verificar que no la haya jugado
  const jugadas = new Set(
    (estado.cartasEnMesa || []).filter(c => c.jugadorId === miId).map(c => c.cartaIdx)
  );
  if (jugadas.has(idx)) return;

  const carta = estado.manos[miId][idx];
  const nuevaJugada = { jugadorId: miId, carta, cartaIdx: idx, mano: estado.manoActual };

  const nuevasCartas = [...(estado.cartasEnMesa || []), nuevaJugada];

  // Siguiente turno
  let nuevoTurnoIdx = (estado.turnoIdx + 1) % estado.orden.length;

  // Ver si ya jugaron todos en esta mano
  const jugadasEstaMano = nuevasCartas.filter(c => c.mano === estado.manoActual);
  const finMano = jugadasEstaMano.length === estado.orden.length;

  const updates = {
    [`salas/${salaId}/juego/cartasEnMesa`]: nuevasCartas,
    [`salas/${salaId}/juego/turnoIdx`]: nuevoTurnoIdx,
    [`salas/${salaId}/juego/finMano`]: finMano,
    [`salas/${salaId}/juego/faseEnvido`]: estado.manoActual === 0 ? 'resuelto' : estado.faseEnvido,
  };

  await update(ref(db), updates);
}

async function cantarTruco(nivel) {
  const niveles = { 1: 'cantado', 2: 'retrucando', 3: 'valecuatrando' };
  await update(ref(db, `salas/${salaId}/juego/truco`), {
    estado: niveles[nivel] || 'cantado',
    cantadoPor: miId,
    nivel
  });
}

async function cantarEnvido(nivel) {
  await update(ref(db, `salas/${salaId}/juego/envido`), {
    estado: 'cantado',
    cantadoPor: miId,
    nivel
  });
  await update(ref(db, `salas/${salaId}/juego`), { faseEnvido: 'cantado' });
}

async function responderCanto(respuesta) {
  const estado = estadoLocal;
  const trucoEspera = ['cantado','retrucando','valecuatrando'].includes(estado.truco.estado);
  const envidoEspera = estado.envido.estado === 'cantado';

  if (trucoEspera) {
    if (respuesta === 'quiero') {
      await update(ref(db, `salas/${salaId}/juego/truco`), { estado: 'aceptado' });
    } else {
      // No quiero: gana el que cantó
      const cantadorEquipo = estado.jugadores[estado.truco.cantadoPor]?.equipo;
      await resolverPorRendicion(cantadorEquipo, 'truco');
    }
  } else if (envidoEspera) {
    if (respuesta === 'quiero') {
      // Resolver envido
      await resolverEnvido(estado);
    } else {
      // No quiero envido
      const cantadorEquipo = estado.jugadores[estado.envido.cantadoPor]?.equipo;
      const ptsEnvido = [1, 2, 2, 3, 0][estado.envido.nivel] || 1;
      await sumarPuntos(cantadorEquipo, ptsEnvido, estado, 'envido_resuelto');
    }
  }
}

async function resolverEnvido(estado) {
  // Calcular envido por equipo
  const porEquipo = [[], []];
  Object.entries(estado.manos).forEach(([jId, cartas]) => {
    const eq = estado.jugadores[jId]?.equipo;
    if (eq !== undefined) porEquipo[eq].push(calcularEnvido(cartas));
  });
  const ptse0 = Math.max(...porEquipo[0]);
  const ptse1 = Math.max(...porEquipo[1]);

  let ganadorEq = ptse0 > ptse1 ? 0 : 1;
  if (ptse0 === ptse1) ganadorEq = 0; // empate: mano (equipo 0 por simplificación)

  const nivel = estado.envido.nivel;
  let ptsGanados = 1;
  if (nivel === 1) ptsGanados = 2;
  else if (nivel === 2) ptsGanados = 4;
  else if (nivel === 3) ptsGanados = 3;
  else if (nivel === 4) ptsGanados = 30 - estado.puntos[ganadorEq]; // falta envido

  await sumarPuntos(ganadorEq, ptsGanados, estado, 'envido_resuelto', { e0: ptse0, e1: ptse1 });
}

async function irAlMazo() {
  const estado = estadoLocal;
  const miEquipoLocal = estado.jugadores[miId]?.equipo;
  const contrario = miEquipoLocal === 0 ? 1 : 0;
  // Ganar truco el contrario
  const ptsTruco = estado.truco.estado === 'aceptado' ? [1,2,3][estado.truco.nivel - 1] || 1 : 1;
  await sumarPuntos(contrario, ptsTruco, estado, 'fin_partida_mazo');
}

async function resolverPorRendicion(ganadorEquipo, tipo) {
  const estado = estadoLocal;
  let pts = 1;
  if (tipo === 'truco') {
    pts = estado.truco.nivel > 1 ? [1,2,3][estado.truco.nivel - 2] || 1 : 1;
  }
  await sumarPuntos(ganadorEquipo, pts, estado, 'truco_resuelto');
}

async function sumarPuntos(equipoGanador, pts, estado, motivo, extra) {
  const nuevosPuntos = [...estado.puntos];
  nuevosPuntos[equipoGanador] += pts;
  const fin = nuevosPuntos[0] >= 30 || nuevosPuntos[1] >= 30;

  const updates = {
    [`salas/${salaId}/juego/puntos`]: nuevosPuntos,
    [`salas/${salaId}/juego/finPartida`]: fin,
    [`salas/${salaId}/juego/ganadorPartida`]: fin ? equipoGanador : null,
    [`salas/${salaId}/juego/faseEnvido`]: motivo === 'envido_resuelto' ? 'resuelto' : estado.faseEnvido,
  };

  if (motivo === 'truco_resuelto') {
    updates[`salas/${salaId}/juego/truco`] = { estado: 'resuelto', cantadoPor: estado.truco.cantadoPor, nivel: estado.truco.nivel };
  }
  if (motivo === 'envido_resuelto') {
    updates[`salas/${salaId}/juego/envido`] = { ...estado.envido, estado: 'resuelto' };
  }

  await update(ref(db), updates);
}

// ===== FIN DE MANO =====
function manejarFinMano(estado) {
  const jugadasEstaMano = (estado.cartasEnMesa || []).filter(c => c.mano === estado.manoActual);

  // Resolver ganador de mano
  let ganador = resolverMano(jugadasEstaMano, estado.jugadores);

  setTimeout(async () => {
    const nuevosResultados = [...(estado.resultadoManos || []), ganador];
    const nuevaMano = estado.manoActual + 1;

    // ¿Hay ganador de la ronda?
    const ganadorRonda = resolverRonda(nuevosResultados);

    if (ganadorRonda !== null || nuevaMano >= 3) {
      // Fin de ronda
      const eq = ganadorRonda !== null ? ganadorRonda : 0;
      // Sumar puntos de truco
      const nivelTruco = estado.truco.estado === 'aceptado' ? estado.truco.nivel : (estado.truco.estado === 'sin_cantar' ? 0 : 0);
      const ptsTruco = nivelTruco === 0 ? 1 : nivelTruco;
      const nuevosPuntos = [...estado.puntos];
      nuevosPuntos[eq] += ptsTruco;
      const fin = nuevosPuntos[0] >= 30 || nuevosPuntos[1] >= 30;

      if (fin) {
        await update(ref(db, `salas/${salaId}/juego`), {
          resultadoManos: nuevosResultados,
          finPartida: true,
          ganadorPartida: eq,
          puntos: nuevosPuntos,
          finMano: false,
        });
      } else {
        // Nueva ronda
        const jugadores = Object.values(estado.jugadores);
        setTimeout(async () => {
          await iniciarNuevaRonda(jugadores, nuevosPuntos);
        }, 2000);

        await update(ref(db, `salas/${salaId}/juego`), {
          resultadoManos: nuevosResultados,
          finMano: false,
          ganadorMano: eq,
        });
      }
    } else {
      // Siguiente mano
      await update(ref(db, `salas/${salaId}/juego`), {
        manoActual: nuevaMano,
        resultadoManos: nuevosResultados,
        turnoIdx: 0,
        finMano: false,
        ganadorMano: ganador,
      });
    }
  }, 1500);
}

function resolverMano(jugadas, jugadores) {
  // Encuentra la carta más fuerte (menor valor en JERARQUIA = más fuerte)
  let mejor = null;
  let empate = false;

  for (const j of jugadas) {
    const p = poderCarta(j.carta);
    if (!mejor || p < poderCarta(mejor.carta)) {
      mejor = j;
      empate = false;
    } else if (p === poderCarta(mejor.carta)) {
      empate = true;
    }
  }

  if (empate) return 'empate';
  return jugadores[mejor.jugadorId]?.equipo ?? 0;
}

function resolverRonda(resultados) {
  const gana = (eq) => resultados.filter(r => r === eq).length;
  const g0 = gana(0), g1 = gana(1);
  if (g0 >= 2) return 0;
  if (g1 >= 2) return 1;
  // Primera mano empate: gana segunda
  if (resultados[0] === 'empate' && resultados.length >= 2) {
    if (resultados[1] !== 'empate') return resultados[1];
  }
  if (resultados.length === 3) {
    // Todo empatado: gana el que fue "mano" (equipo 0)
    return 0;
  }
  return null;
}

// ===== NOTIFICACIONES =====
function mostrarNotif(titulo, msg, btnTxt, fn) {
  document.getElementById('notif-titulo').textContent = titulo;
  document.getElementById('notif-msg').textContent = msg;
  document.getElementById('notif-btn').textContent = btnTxt || 'OK';
  document.getElementById('notif').classList.remove('hidden');
  document.getElementById('overlay').classList.remove('hidden');
  if (fn) document.getElementById('notif-btn').onclick = fn;
  else document.getElementById('notif-btn').onclick = cerrarNotif;
}

window.cerrarNotif = function() {
  document.getElementById('notif').classList.add('hidden');
  document.getElementById('overlay').classList.add('hidden');
};

// ===== ESCUCHAR CAMBIOS EN TIEMPO REAL =====
function escucharJuego() {
  const jRef = ref(db, `salas/${salaId}/juego`);
  const unsub = onValue(jRef, (snap) => {
    if (!snap.exists()) return;
    estadoLocal = snap.val();
    renderJuego();
  });
  listeners.push(unsub);
}

// Arrancar escucha al cargar
// (se inicia desde mostrarVistaSala → escucharSala, que ya detecta el estado 'jugando')
// Pero necesitamos también escuchar el juego directamente:
const origEscucharSala = window.empezarPartida;

// Patch: cuando se detecta estado jugando, suscribir al juego
let juegoSuscrito = false;
const _onValue = onValue;

// Reemplazar el listener de sala para que cuando arranque, suscriba al juego
function patchSalaListener() {
  salaRef = ref(db, `salas/${salaId}`);
  const unsub = onValue(salaRef, (snap) => {
    if (!snap.exists()) return;
    const sala = snap.val();

    if (sala.estado === 'jugando' && !juegoSuscrito) {
      juegoSuscrito = true;
      escucharJuego();
    }

    if (sala.estado === 'esperando') {
      // Mostrar jugadores
      const jugadores = sala.jugadores || {};
      const lista = document.getElementById('lista-jugadores');
      if (!lista) return;
      lista.innerHTML = '';

      const porEquipo = [[], []];
      Object.values(jugadores).forEach(j => {
        if (porEquipo[j.equipo]) porEquipo[j.equipo].push(j);
      });

      for (let eq = 0; eq < 2; eq++) {
        for (let i = 0; i < 2; i++) {
          const j = porEquipo[eq][i];
          const div = document.createElement('div');
          div.className = `jugador-item equipo-${eq}${j ? '' : ' vacio'}`;
          if (j) {
            div.innerHTML = `
              <div class="jugador-avatar">${j.nombre[0].toUpperCase()}</div>
              <span>${j.nombre}${j.id === miId ? ' (vos)' : ''}</span>
              <span class="badge-equipo e${eq}">${eq === 0 ? 'Azul' : 'Rojo'}</span>`;
          } else {
            div.innerHTML = `<div class="jugador-avatar">?</div><span>Esperando...</span>
              <span class="badge-equipo e${eq}">${eq === 0 ? 'Azul' : 'Rojo'}</span>`;
          }
          lista.appendChild(div);
        }
      }

      const total = Object.keys(jugadores).length;
      const msg = document.getElementById('msg-espera');
      const btnEmpezar = document.getElementById('btn-empezar');
      if (!msg) return;

      if (total < 4) {
        msg.textContent = `Esperando jugadores... (${total}/4)`;
        if (btnEmpezar) btnEmpezar.classList.add('hidden');
      } else {
        msg.textContent = 'Todo listo para empezar.';
        if (soyCreador && btnEmpezar) btnEmpezar.classList.remove('hidden');
        else if (msg) msg.textContent += ' El creador de la sala va a iniciar.';
      }
    }
  });
  listeners.push(unsub);
}

// Override escucharSala para usar la versión con patch
const origMostrarVistaSala = mostrarVistaSala;
function mostrarVistaSala() {
  document.getElementById('vista-inicio').classList.add('hidden');
  document.getElementById('vista-unirse').classList.add('hidden');
  document.getElementById('vista-sala').classList.remove('hidden');
  document.getElementById('codigo-display').textContent = salaId;
  patchSalaListener();
}

// Re-bind
window.crearSala = async function() {
  const nombre = document.getElementById('input-nombre').value.trim();
  const equipo = parseInt(document.getElementById('select-equipo').value);
  if (!nombre) { mostrarNotif('⚠️', 'Ingresá tu nombre'); return; }

  miId = generarId();
  miNombre = nombre;
  miEquipo = equipo;
  salaId = generarCodigo();
  soyCreador = true;

  const jugador = { id: miId, nombre, equipo };
  await set(ref(db, `salas/${salaId}`), {
    creador: miId,
    estado: 'esperando',
    jugadores: { [miId]: jugador },
    juego: null
  });

  mostrarVistaSala();
};

window.unirseASala = async function() {
  const nombre = document.getElementById('input-nombre2').value.trim();
  const equipo = parseInt(document.getElementById('select-equipo2').value);
  const codigo = document.getElementById('input-codigo').value.trim().toUpperCase();
  if (!nombre) { mostrarNotif('⚠️', 'Ingresá tu nombre'); return; }
  if (!codigo) { mostrarNotif('⚠️', 'Ingresá el código de sala'); return; }

  const snap = await get(ref(db, `salas/${codigo}`));
  if (!snap.exists()) { mostrarNotif('❌', 'Sala no encontrada'); return; }
  const sala = snap.val();
  const jugadores = sala.jugadores || {};
  if (Object.keys(jugadores).length >= 4) { mostrarNotif('❌', 'La sala está llena'); return; }

  miId = generarId();
  miNombre = nombre;
  miEquipo = equipo;
  salaId = codigo;

  await update(ref(db, `salas/${salaId}/jugadores`), {
    [miId]: { id: miId, nombre, equipo }
  });

  mostrarVistaSala();
};
